Screens:
  LedgerScreen:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |
        =If(IsBlank(varScanDirection), UpdateContext({varScanDirection: "Inbound"}));
        If(
            varScanDirection = "Inbound" && IsBlank(gblRecipient),
            SetFocus(txtRecipient),
            UpdateContext({varTriggerFocus: true})
        );
    Children:
      - ScreenContainer1_2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(243, 244, 246, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =16
            LayoutWrap: =true
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - LeftContainer1_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =3
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =12
                  LayoutMinWidth: =400
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =16
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - lblLedgerHeader_1:
                      Control: FluentV8/Label@1.8.6
                      Properties:
                        FontSize: =14
                        FontWeight: =FontWeight.Semibold
                        Text: ="Recent Scans (Ledger)"
                  - txtSearchLedger_1:
                      Control: FluentV8/TextBox@1.7.2
                      Properties:
                        LayoutMinHeight: =36
                        AccessibleLabel: ="Search the current scan session"
                        Placeholder: ="Search tracking, carrier, recipient, or label details"
                  - Gallery1_2:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_pcfCore
                      Properties:
                        AccessibleLabel: ="Recent package scans in this session"
                        BorderColor: =RGBA(243, 242, 241, 1)
                        FocusedBorderColor: =RGBA(98, 100, 167, 1)
                        FocusedBorderThickness: =2
                        Items: |
                          =Sort(Filter(colRecentScans, txtSearchLedger_1.Value in TrackingNumber || txtSearchLedger_1.Value in ScanNotes || txtSearchLedger_1.Value in Carrier || txtSearchLedger_1.Value in DisplayAddressee || txtSearchLedger_1.Value in DisplayAddressBlock), Timestamp, SortOrder.Descending)
                        LayoutMinHeight: =200
                        TabIndex: =0
                        TemplateSize: =190
                      Children:
                        - HtmlText1_2:
                            Control: HtmlViewer@2.1.0
                            Properties:
                              DisabledBorderColor: =RGBA(200, 198, 196, 1)
                              Font: =Font.'Segoe UI'
                              Height: =Parent.TemplateHeight
                              HtmlText: |
                                ="<div style='padding:12px 45px 12px 12px; border: 1px solid #edebe9; border-radius: 6px; background-color: #faf9f8; box-sizing: border-box;'>
                                  <div style='display:flex; justify-content:space-between; align-items:center;'>
                                    <b style='font-size:16px; color:#323130;'>" & ThisItem.TrackingNumber & "</b>
                                    <span style='font-size:11px; font-weight:bold; padding:3px 8px; border-radius:12px; background-color:" & If(ThisItem.Direction="Inbound", "#dff6dd; color:#107c10;", "#fde7e9; color:#a4262c;") & "'>" & Upper(ThisItem.Direction) & "</span>
                                  </div>
                                  <div style='font-size:13px; color:#605e5c; margin-top:6px;'>
                                    <b>Carrier:</b> " & ThisItem.Carrier & " &nbsp;&bull;&nbsp; <b>Time:</b> " & Text(ThisItem.Timestamp, "hh:mm:ss AM/PM") & "
                                  </div>" &
                                  If(!IsBlank(ThisItem.DisplayAddressee) || !IsBlank(ThisItem.DisplayAddressBlock),
                                    "<div style='margin-top:6px; font-size:13px; color:#323130;'>" &
                                      If(!IsBlank(ThisItem.DisplayAddressee), "<b>To:</b> " & ThisItem.DisplayAddressee & "<br>", "") &
                                      If(!IsBlank(ThisItem.DisplayAddressBlock), "<b>Address:</b> " & ThisItem.DisplayAddressBlock, "") &
                                    "</div>",
                                    ""
                                  ) &
                                  If(!IsBlank(ThisItem.Recipient),
                                    "<div style='margin-top:6px; font-size:13px; color:#323130;'><b>Designated recipient:</b> " & ThisItem.Recipient & "</div>",
                                    ""
                                  ) &
                                  If(!IsBlank(ThisItem.DisplayWeight) || !IsBlank(ThisItem.DisplayPkg),
                                    "<div style='margin-top:8px; display:flex; gap:10px;'>
                                      <span style='background:#e1dfdd; padding:2px 6px; border-radius:4px; font-size:11px;'><b>Weight:</b> " & Coalesce(ThisItem.DisplayWeight, "Unknown") & "</span>
                                      <span style='background:#e1dfdd; padding:2px 6px; border-radius:4px; font-size:11px;'><b>Package:</b> " & Coalesce(ThisItem.DisplayPkg, "Unknown") & "</span>
                                     </div>",
                                    ""
                                  ) &
                                  If(!IsBlank(ThisItem.ScanNotes),
                                    "<div style='margin-top:8px; font-size:11px; color:#323130; background:#ffffff; padding:6px; border:1px solid #e1dfdd; border-radius:4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;'>" & ThisItem.ScanNotes & "</div>",
                                    ""
                                  ) &
                                "</div>"
                              Size: =10.5
                              Width: =Parent.TemplateWidth - 16
                        - icnDeleteScan_2:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              Color: =RGBA(164, 38, 44, 1)
                              Height: =20
                              HoverColor: =RGBA(201, 36, 43, 1)
                              Icon: =Icon.Trash
                              OnSelect: |
                                =If(
                                    IsBlank(ThisItem.TrackingId),
                                    Remove(colRecentScans, ThisItem);
                                    Notify("This older local entry had no database ID and was removed only from this session.", NotificationType.Warning),
                                    IfError(
                                        Patch(Tracking, LookUp(Tracking, ID = ThisItem.TrackingId), {field_3: "Voided"});
                                        Remove(colRecentScans, ThisItem),
                                        Notify("The database record could not be voided: " & FirstError.Message, NotificationType.Error)
                                    )
                                )
                              AccessibleLabel: ="Void this scan"
                              TabIndex: =0
                              Tooltip: ="Void this scan and remove it from the local ledger"
                              Width: =20
                              X: =Parent.TemplateWidth - 48
                              Y: =16
            - RightContainer1_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =2
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =16
                  LayoutMinWidth: =340
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =16
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - lblControlHeader_1:
                      Control: FluentV8/Label@1.8.6
                      Properties:
                        FontSize: =18
                        FontWeight: =FontWeight.Semibold
                        Text: ="Receive Packages"
                  - lblControlInstructions:
                      Control: FluentV8/Label@1.8.6
                      Properties:
                        AutoHeight: =true
                        Text: =If(varScanDirection = "Inbound", "Choose a recipient, then scan each arriving package.", "Scan a package or packing-list QR to mark it picked up.")
                  - txtRecipient:
                      Control: TextInput@0.0.54
                      Properties:
                        AccessibleLabel: ="Designated package recipient"
                        LayoutMinHeight: =44
                        OnChange: "=Set(gblRecipient, Trim(Self.Value)); If(!IsBlank(gblRecipient) && varScanDirection = \"Inbound\", UpdateContext({varTriggerFocus: true}))"
                        Placeholder: ="Designated recipient (required)"
                        Value: =gblRecipient
                  - txtBarcodeScanner_2:
                      Control: TextInput@0.0.54
                      Properties:
                        AccessibleLabel: ="Package barcode or packing-list QR scanner"
                        DisplayMode: =If(varScanDirection = "Inbound" && IsBlank(gblRecipient), DisplayMode.Disabled, DisplayMode.Edit)
                        LayoutMinHeight: =48
                        OnChange: |
                          =// txtBarcodeScanner_2.OnChange
                          // Preserves the original 2D parser. Inbound scans receive packages; outbound scans pick them up.
                          UpdateContext({
                              varRawScan: Trim(Substitute(Substitute(Self.Value, Char(13), ""), Char(10), "")),
                              varScanHandled: false,
                              varParsedTracking: Blank(),
                              varDetectedCarrier: Blank(),
                              varExtractedWeight: Blank(),
                              varExtractedPkg: Blank(),
                              varExtractedAddressee: Blank(),
                              varExtractedAddressBlock: Blank(),
                              varScanNotes: Blank()
                          });

                          If(
                              !IsBlank(varRawScan),
                              If(
                                  StartsWith(varRawScan, "PKG|"),
                                  UpdateContext({
                                      varParsedTracking: Trim(Last(Split(varRawScan, "|")).Value),
                                      varDetectedCarrier: Blank(),
                                      varExtractedWeight: Blank(),
                                      varExtractedPkg: Blank(),
                                      varExtractedAddressee: Blank(),
                                      varExtractedAddressBlock: Blank(),
                                      varScanNotes: "Packing-list QR scanned"
                                  }),
                                  StartsWith(varRawScan, "[)>"),
                                  UpdateContext({
                                      varParsedTracking: Coalesce(
                                          Match(varRawScan, "31Z(?<trk>\d{20,34})").trk,
                                          Match(varRawScan, "\d{34}").FullMatch,
                                          Match(varRawScan, "\d{22}").FullMatch,
                                          Match(varRawScan, "1Z[A-Z0-9]{16}").FullMatch
                                      ),
                                      varDetectedCarrier: If("FDEG" in varRawScan || "FDEN" in varRawScan || "FX" in varRawScan, "FedEx", "UPSN" in varRawScan, "UPS", "Other"),
                                      varExtractedWeight: Match(varRawScan, "\d+(\.\d+)?(LB|KG)").FullMatch,
                                      varExtractedPkg: Match(varRawScan, "\d+/\d+").FullMatch,
                                      varExtractedAddressee: Trim(Coalesce(Match(varRawScan, "11Z(?<addr>[a-zA-Z\s\.\-]+)").addr, Match(varRawScan, "12Z(?<addr>[a-zA-Z\s\.\-]+)").addr)),
                                      varExtractedAddressBlock: Trim(Match(varRawScan, "(?:LB|KG)[A-Z]?(?<block>[A-Za-z0-9\s\.,\-]+?)(?:\d{3,4}Z|11Z|12Z|13Z|31Z)").block),
                                      varScanNotes: "2D carrier label scanned"
                                  }),
                                  UpdateContext({
                                      varParsedTracking: varRawScan,
                                      varDetectedCarrier: If(
                                          StartsWith(Lower(varRawScan), "1z") && Len(varRawScan) = 18, "UPS",
                                          IsMatch(varRawScan, "^\d{12}$|^\d{15}$|^\d{20}$|^\d{34}$"), "FedEx",
                                          (StartsWith(varRawScan, "92") || StartsWith(varRawScan, "93") || StartsWith(varRawScan, "94")) && Len(varRawScan) >= 20, "USPS",
                                          IsMatch(varRawScan, "^\d{10}$"), "DHL",
                                          "Other"
                                      ),
                                      varExtractedWeight: Blank(),
                                      varExtractedPkg: Blank(),
                                      varExtractedAddressee: Blank(),
                                      varExtractedAddressBlock: Blank(),
                                      varScanNotes: Blank()
                                  })
                              );

                              If(
                                  IsBlank(varParsedTracking),
                                  Notify("No supported tracking number was found in the scan.", NotificationType.Error),

                                  varScanDirection = "Outbound",
                                  With(
                                      {pickupRecord: LookUp(Tracking, Title = varParsedTracking && (field_3 = "Ready for Pickup" || field_3 = "Arrived on Dock"))},
                                      If(
                                          IsBlank(pickupRecord),
                                          Notify("No package awaiting pickup was found for this tracking number.", NotificationType.Warning),
                                          IfError(
                                              Patch(Tracking, pickupRecord, {field_2: "Outbound", field_3: "Picked Up", SignedOutDateTime: Now()});
                                              Collect(colRecentScans, {TrackingId: pickupRecord.ID, TrackingNumber: pickupRecord.Title, Recipient: pickupRecord.field_4, Carrier: pickupRecord.field_1, Timestamp: Now(), ScanNotes: "Picked up", Direction: "Outbound", DisplayWeight: Blank(), DisplayPkg: Blank(), DisplayAddressee: pickupRecord.field_4, DisplayAddressBlock: Blank()});
                                              UpdateContext({varScanHandled: true});
                                              Notify("Package picked up by " & pickupRecord.field_4 & ".", NotificationType.Success),
                                              Notify("Pickup could not be saved: " & FirstError.Message, NotificationType.Error)
                                          )
                                      )
                                  ),

                                  IsBlank(gblRecipient),
                                  Reset(txtBarcodeScanner_2);
                                  SetFocus(txtRecipient);
                                  Notify("Enter a designated recipient before scanning an inbound package.", NotificationType.Warning),

                                  With(
                                      {activeRecord: LookUp(Tracking, Title = varParsedTracking && (field_3 = "Ready for Pickup" || field_3 = "Arrived on Dock"))},
                                      If(
                                          !IsBlank(activeRecord),
                                          UpdateContext({varScanHandled: true});
                                          Notify("This package is already assigned to " & Coalesce(activeRecord.field_4, "a recipient") & ".", NotificationType.Warning),
                                          IfError(
                                              Set(varSavedTracking, Patch(Tracking, Defaults(Tracking), {Title: varParsedTracking, field_1: varDetectedCarrier, field_2: "Inbound", field_3: "Ready for Pickup", field_4: gblRecipient, field_6: Now(), field_7: varScanNotes}));
                                              Collect(colRecentScans, {TrackingId: varSavedTracking.ID, TrackingNumber: varParsedTracking, Recipient: gblRecipient, Carrier: varDetectedCarrier, Timestamp: Now(), ScanNotes: varScanNotes, Direction: "Inbound", DisplayWeight: varExtractedWeight, DisplayPkg: varExtractedPkg, DisplayAddressee: varExtractedAddressee, DisplayAddressBlock: varExtractedAddressBlock});
                                              UpdateContext({varScanHandled: true});
                                              Notify("Package assigned to " & gblRecipient & ".", NotificationType.Success),
                                              Notify("The package could not be saved: " & FirstError.Message, NotificationType.Error)
                                          )
                                      )
                                  )
                              );

                              If(
                                  varScanHandled,
                                  Reset(txtBarcodeScanner_2);
                                  UpdateContext({varTriggerFocus: true})
                              )
                          )
                        Placeholder: =If(IsBlank(gblRecipient), "Enter a recipient first", "Scan package or QR code")
                  - DirectionToggle_2:
                      Control: FluentV8/Toggle@1.6.7
                      Properties:
                        AccessibleLabel: ="Switch between inbound receiving and outbound pickup"
                        Checked: =varScanDirection = "Inbound"
                        LayoutMinHeight: =40
                        OffText: ="Outbound"
                        OnCheck: |
                          =UpdateContext({varScanDirection: "Inbound"});
                          If(IsBlank(gblRecipient), SetFocus(txtRecipient), UpdateContext({varTriggerFocus: true}))
                        OnText: ="Inbound"
                        OnUncheck: |
                          =UpdateContext({varScanDirection: "Outbound"});
                          UpdateContext({varTriggerFocus: true})
                  - lblManifestHint:
                      Control: FluentV8/Label@1.8.6
                      Properties:
                        AutoHeight: =true
                        Text: =If(varScanDirection = "Outbound", "Pickup mode | " & CountRows(colRecentScans) & " session scan(s)", If(IsBlank(gblRecipient), "Recipient required before scanning", "Receiving for " & gblRecipient & " | " & CountRows(colRecentScans) & " session scan(s)"))
                  - btnViewHistory:
                      Control: FluentV8/Button@1.5.13
                      Properties:
                        AccessibleLabel: ="Open package database history"
                        OnSelect: =Navigate(History, ScreenTransition.Fade)
                        Text: ="View Database History"
                  - btnCreatePackingList:
                      Control: FluentV8/Button@1.5.13
                      Properties:
                        AccessibleLabel: ="Open the designated recipient's packing list"
                        DisplayMode: =If(IsBlank(gblRecipient), DisplayMode.Disabled, DisplayMode.Edit)
                        OnSelect: =If(IsBlank(gblRecipient), Notify("Enter a designated recipient before creating a packing list.", NotificationType.Warning), Set(gblManifestPreparedAt, Now()); Navigate(PackingList, ScreenTransition.Fade))
                        Text: ="Create Packing List"
                  - btnClearScans_1:
                      Control: FluentV8/Button@1.5.13
                      Properties:
                        AccessibleLabel: ="Clear recent scans from this local session"
                        OnSelect: =Clear(colRecentScans)
                        Text: ="Clear Local Ledger"
                  - tmrFocusScanner_1:
                      Control: Timer@2.1.0
                      Properties:
                        Duration: =50
                        OnTimerEnd: |
                          =UpdateContext({varTriggerFocus: false});
                          SetFocus(txtBarcodeScanner_2);
                        Start: =varTriggerFocus
                        Visible: =false
