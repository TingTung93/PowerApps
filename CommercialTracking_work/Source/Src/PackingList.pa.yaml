# Copy this screen into the canvas app. It intentionally uses the existing Tracking list fields.
Screens:
  PackingList:
    Properties:
      Fill: =RGBA(243, 244, 246, 1)
      OnVisible: |
        =If(
            IsBlank(gblRecipient),
            Clear(colManifestPackages),
            Refresh(Tracking);
            ClearCollect(
                colManifestPackages,
                Sort(
                    Filter(
                        Tracking,
                        field_4 = gblRecipient &&
                        (field_3 = "Ready for Pickup" || field_3 = "Arrived on Dock")
                    ),
                    field_6,
                    SortOrder.Descending
                )
            )
        )
    Children:
      - conPackingList:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(255, 255, 255, 1)
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =12
            PaddingBottom: =24
            PaddingLeft: =24
            PaddingRight: =24
            PaddingTop: =24
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Width: =Parent.Width
          Children:
            - lblPackingTitle:
                Control: FluentV8/Label@1.8.6
                Properties:
                  FontSize: =20
                  FontWeight: =FontWeight.Semibold
                  Text: ="Customer Packing List"
            - btnBackToLedger:
                Control: FluentV8/Button@1.5.13
                Properties:
                  AccessibleLabel: ="Return to the package scanner"
                  AlignInContainer: =AlignInContainer.Start
                  OnSelect: =Navigate(LedgerScreen, ScreenTransition.Fade)
                  Text: ="Back to Scanner"
                  Visible: =Not(PackingList.Printing)
            - txtManifestRecipient:
                Control: TextInput@0.0.54
                Properties:
                  AccessibleLabel: ="Recipient whose packages appear on this packing list"
                  DisplayMode: =DisplayMode.View
                  LayoutMinHeight: =44
                  Value: =gblRecipient
                  Placeholder: ="No recipient selected"
            - lblManifestMeta:
                Control: FluentV8/Label@1.8.6
                Properties:
                  Text: ="Prepared " & Text(gblManifestPreparedAt, "mm/dd/yyyy hh:mm AM/PM") & " | " & CountRows(colManifestPackages) & " package(s)"
            - lblEmptyManifest:
                Control: FluentV8/Label@1.8.6
                Properties:
                  AutoHeight: =true
                  Text: =If(IsBlank(gblRecipient), "Return to the scanner and choose a recipient.", "No packages are currently ready for pickup for this recipient.")
                  Visible: =IsEmpty(colManifestPackages)
            - galPackingList:
                Control: Gallery@2.15.0
                Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_pcfCore
                Properties:
                  AccessibleLabel: ="Packages assigned to the selected recipient"
                  FillPortions: =1
                  Items: =colManifestPackages
                  LayoutMinHeight: =320
                  TemplatePadding: =8
                  TemplateSize: =88
                Children:
                  - lblTracking:
                      Control: FluentV8/Label@1.8.6
                      Properties:
                        FontWeight: =FontWeight.Semibold
                        Height: =28
                        Text: =ThisItem.Title
                        Width: =Parent.TemplateWidth - 112
                        X: =12
                        Y: =10
                  - lblPackageDetails:
                      Control: FluentV8/Label@1.8.6
                      Properties:
                        Height: =24
                        Width: =Parent.TemplateWidth - 112
                        X: =12
                        Y: =42
                        Text: =ThisItem.field_1 & " | received " & Text(ThisItem.field_6, "mm/dd/yyyy hh:mm AM/PM")
                  - imgPackageQr:
                      Control: Image@2.2.3
                      Properties:
                        AccessibleLabel: ="QR code for tracking number " & ThisItem.Title
                        Height: =64
                        Image: ="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" & EncodeUrl("PKG|" & ThisItem.Title)
                        Width: =64
                        X: =Parent.TemplateWidth - 76
                        Y: =8
            - conPackingActions:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  LayoutMinHeight: =44
                  Visible: =Not(PackingList.Printing)
                Children:
                  - btnPrintPackingList:
                      Control: FluentV8/Button@1.5.13
                      Properties:
                        AccessibleLabel: ="Print or save this customer packing list"
                        DisplayMode: =If(IsEmpty(colManifestPackages), DisplayMode.Disabled, DisplayMode.Edit)
                        OnSelect: =Print()
                        Text: ="Print / Save PDF"
