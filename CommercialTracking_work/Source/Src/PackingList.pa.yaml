# Copy this screen into the canvas app. It intentionally uses the existing Tracking list fields.
Screens:
  PackingList:
    Properties:
      Fill: =RGBA(243, 244, 246, 1)
      OnVisible: =Blank()
    Children:
      - conPackingList:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(255, 255, 255, 1)
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =12
            PaddingBottom: =24
            PaddingLeft: =24
            PaddingRight: =24
            PaddingTop: =24
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            RadiusTopLeft: =8
            RadiusTopRight: =8
            Width: =Parent.Width
          Children:
            - lblPackingTitle:
                Control: FluentV8/Label@1.8.6
                Properties:
                  FontSize: =20
                  FontWeight: =FontWeight.Semibold
                  Text: ="Customer Packing List"
            - btnBackToLedger:
                Control: FluentV8/Button@1.5.13
                Properties:
                  AccessibleLabel: ="Return to the package scanner"
                  AlignInContainer: =AlignInContainer.Start
                  OnSelect: =Navigate(LedgerScreen, ScreenTransition.Fade)
                  Text: ="Back to Scanner"
                  Visible: =Not(PackingList.Printing)
            - txtManifestRecipient:
                Control: TextInput@0.0.54
                Properties:
                  AccessibleLabel: ="Recipient whose packages appear on this packing list"
                  DisplayMode: =DisplayMode.View
                  LayoutMinHeight: =44
                  Value: =gblRecipient
                  Placeholder: ="No recipient selected"
            - lblManifestMeta:
                Control: FluentV8/Label@1.8.6
                Properties:
                  Text: ="Prepared " & Text(gblManifestPreparedAt, "mm/dd/yyyy hh:mm AM/PM") & " | " & CountRows(galPackingList.AllItems) & " package(s)"
            - lblEmptyManifest:
                Control: FluentV8/Label@1.8.6
                Properties:
                  AutoHeight: =true
                  Text: =If(IsBlank(gblRecipient), "Return to the scanner and choose a recipient.", "No packages are currently ready for pickup for this recipient.")
                  Visible: =IsEmpty(galPackingList.AllItems)
            - galPackingList:
                Control: Gallery@2.15.0
                Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_pcfCore
                Properties:
                  AccessibleLabel: ="Packages assigned to the selected recipient"
                  FillPortions: =1
                  Items: |
                    =If(
                        IsBlank(gblRecipient),
                        Filter(Tracking, false),
                        Sort(
                            Filter(
                                Tracking,
                                field_4 = gblRecipient &&
                                (field_3 = "Ready for Pickup" || field_3 = "Arrived on Dock")
                            ),
                            field_6,
                            SortOrder.Descending
                        )
                    )
                  LayoutMinHeight: =320
                  TemplatePadding: =8
                  TemplateSize: =92
                Children:
                  - htmlPackingListCard:
                      Control: HtmlViewer@2.1.0
                      Properties:
                        DisabledBorderColor: =RGBA(200, 198, 196, 1)
                        Font: =Font.'Segoe UI'
                        Height: =Parent.TemplateHeight
                        HtmlText: |
                          ="<div style='display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 12px; border:1px solid #edebe9; border-radius:6px; background-color:#faf9f8; box-sizing:border-box;'>
                            <div style='min-width:0; flex:1;'>
                              <div style='font-size:15px; font-weight:600; color:#323130; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;'>" & Substitute(Substitute(Substitute(ThisItem.Title, "&", "&amp;"), "<", "&lt;"), ">", "&gt;") & "</div>
                              <div style='margin-top:6px; font-size:12px; color:#605e5c; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;'><b>Carrier:</b> " & Substitute(Substitute(Substitute(Coalesce(ThisItem.field_1, "Unknown"), "&", "&amp;"), "<", "&lt;"), ">", "&gt;") & " &nbsp;&bull;&nbsp; <b>Received:</b> " & Text(ThisItem.field_6, "[$-en-US]mm/dd/yyyy hh:mm AM/PM") & "</div>
                            </div>
                            <img alt='QR code for tracking number " & Substitute(Substitute(Substitute(ThisItem.Title, "&", "&amp;"), "<", "&lt;"), ">", "&gt;") & "' src='https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" & EncodeUrl("PKG|" & ThisItem.Title) & "' style='width:64px; height:64px; flex:0 0 64px;' />
                          </div>"
                        Size: =10.5
                        Width: =Parent.TemplateWidth - 16
            - conPackingActions:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  LayoutMinHeight: =44
                  Visible: =Not(PackingList.Printing)
                Children:
                  - btnPrintPackingList:
                      Control: FluentV8/Button@1.5.13
                      Properties:
                        AccessibleLabel: ="Print or save this customer packing list"
                        DisplayMode: =If(IsEmpty(galPackingList.AllItems), DisplayMode.Disabled, DisplayMode.Edit)
                        OnSelect: =Print()
                        Text: ="Print / Save PDF"
                  - btnRefreshPackingList:
                      Control: FluentV8/Button@1.5.13
                      Properties:
                        AccessibleLabel: ="Refresh package data for this packing list"
                        OnSelect: =Refresh(Tracking)
                        Text: ="Refresh"
