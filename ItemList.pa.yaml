Screens:
  ItemList:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
    Children:
      - ScreenContainer2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - NavBar_1:
                Control: CanvasComponent
                ComponentName: NavBar
                Properties:
                  ActiveFillColor: =App.Theme.Colors.Lighter80
                  ActiveScreen: =App.ActiveScreen
                  ActiveTextColor: =Color.Blue
                  BaseFillColor: =App.Theme.Colors.Darker70
                  Height: =75
                  Items: |+
                    =Table(
                        {Label: "Inventory", Screen: Inventory},
                        {Label: "Registration", Screen: Registration},
                        {Label: "Quick Pick", Screen: QuickPick},
                        {Label: "Rapid Scan", Screen: RapidScan},
                        {Label: "Item List", Screen: ItemList},
                        {Label: "Table View", Screen: 'Table View'},
                        {Label: "Inventory Tool", Screen: InventoryTool},
                        {Label: "Archive", Screen: Archive},
                        {Label: "Settings", Screen: Settings}
                    )
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  Width: =App.Width
            - MainContainer2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =Parent.Fill
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  LayoutWrap: =true
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =Parent.Width-300
                Children:
                  - Gallery1:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_ThreeTextVariant_pcfCore
                      Properties:
                        AccessibleLabel: ="Items gallery"
                        AlignInContainer: =AlignInContainer.Center
                        BorderColor: =RGBA(0, 0, 0, 1)
                        BorderThickness: =1
                        FocusedBorderColor: =RGBA(98, 100, 167, 1)
                        FocusedBorderThickness: =2
                        Height: =Parent.Height
                        ItemAccessibleLabel: ="Inventory items gallery - " & CountIf(Inventories,true) & " items"
                        Items: |-
                          =Sort(
                              Inventories,
                              Expiration,
                              SortOrder.Ascending
                          )
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        OnSelect: =Set(varIsItemSelected, true); Set(varNewMode, false); Set(varEditMode, false); Set(varCurrentItem, Gallery1.Selected)
                        TabIndex: =0
                        TemplateFill: "=If(\r\n    ThisItem.IsSelected,\r\n    RGBA(239, 246, 254, 1), // A very light, accessible blue\r\n    \r\n    // If not selected, use high-contrast tints\r\n    If(\r\n        IsBlank(ThisItem.Expiration),\r\n        RGBA(0, 0, 0, 0),\r\n        Switch(\r\n            true,\r\n            DateValue(ThisItem.Expiration) <= DateAdd(Today(), 7), RGBA(254, 242, 242, 1), // Very light red\r\n            DateValue(ThisItem.Expiration) <= DateAdd(Today(), 30), RGBA(254, 252, 232, 1), // Very light yellow\r\n            RGBA(240, 253, 244, 1)  // Very light green\r\n        )\r\n    )\r\n)\r\n"
                        TemplatePadding: =5
                        TemplateSize: =60
                        Transition: =Transition.Pop
                        Width: =Parent.Width/2
                      Children:
                        - HtmlText4:
                            Control: HtmlViewer@2.1.0
                            Properties:
                              AutoHeight: =true
                              BorderStyle: =BorderStyle.Solid
                              BorderThickness: =1
                              DisabledBorderColor: =RGBA(200, 198, 196, 1)
                              Fill: =RGBA(0, 0, 0, 0)
                              Font: =Font.'Segoe UI'
                              Height: =Parent.TemplateHeight
                              HtmlText: |-
                                =If(
                                    IsBlank(ThisItem.Expiration),

                                    // ===== NO EXPIRATION =====
                                    "<div style='display:flex; font-family:Segoe UI,sans-serif; border-left:5px solid " & If(ThisItem.IsSelected, "#2563EB", "#A1A1AA") & "; padding:8px 12px; height:100%;'>
                                        <div style='flex-grow:1; display:flex; flex-direction:column; justify-content:center;'>
                                            <div style='font-size:16px; font-weight:600; color:" & If(ThisItem.IsSelected, "#1D4ED8", "#1F2937") & ";'>" & ThisItem.Name & "</div>
                                            <div style='font-size:12px; color:#374151;'><b>Batch:</b> " & ThisItem.Batch & "     <b>Qty:</b> " & ThisItem.Quantity & "</div>
                                        </div>
                                        <div style='display:flex; align-items:center; justify-content:flex-end; min-width:90px; text-align:right;'>
                                            <div style='font-size:12px; font-weight:600; color:" & If(ThisItem.IsSelected, "#1D4ED8", "#374151") & ";'>No Expiration</div>
                                        </div>
                                    </div>",

                                    // ===== HAS EXPIRATION =====
                                    "<div style='display:flex; font-family:Segoe UI,sans-serif; border-left:5px solid " & 
                                        If(
                                            ThisItem.IsSelected, 
                                            "#2563EB",
                                            Switch(true, DateValue(ThisItem.Expiration)<=DateAdd(Today(),7),"#DC2626", DateValue(ThisItem.Expiration)<=DateAdd(Today(),30),"#D97706", "#16A34A")
                                        ) & 
                                    "; padding:8px 12px; height:100%;'>
                                        <div style='flex-grow:1; display:flex; flex-direction:column; justify-content:center;'>
                                            <div style='font-size:16px; font-weight:600; color:" & 
                                                If(
                                                    ThisItem.IsSelected, 
                                                    "#1D4ED8",
                                                    If(DateValue(ThisItem.Expiration)<=DateAdd(Today(),7),"#DC2626","#1F2937")
                                                ) & 
                                            ";'>" & ThisItem.Name & "</div>
                                            <div style='font-size:12px; color:#374151;'><b>Batch:</b> " & ThisItem.Batch & "     <b>Qty:</b> " & ThisItem.Quantity & "</div>
                                        </div>
                                        <div style='display:flex; flex-direction:column; align-items:flex-end; justify-content:center; text-align:right; min-width:90px;'>
                                            <div style='font-size:13px; font-weight:700; padding:3px 6px; border-radius:4px; color:" & 
                                                If(
                                                    ThisItem.IsSelected,
                                                    "white",
                                                    Switch(
                                                        true,
                                                        DateValue(ThisItem.Expiration)<=DateAdd(Today(),7), "white",
                                                        DateValue(ThisItem.Expiration)<=DateAdd(Today(),30), "#1F2937",
                                                        "#15803D"
                                                    )
                                                ) &
                                            "; background-color:" & 
                                                If(
                                                    ThisItem.IsSelected,
                                                    "#2563EB",
                                                    Switch(true, DateValue(ThisItem.Expiration)<=DateAdd(Today(),7),"#DC2626", DateValue(ThisItem.Expiration)<=DateAdd(Today(),30),"#FBBF24", "#DCFCE7")
                                                ) & 
                                            ";'>" & 
                                                Switch(true, DateValue(ThisItem.Expiration)<Today(),"EXPIRED", DateValue(ThisItem.Expiration)<=DateAdd(Today(),7),"IN " & DateDiff(Today(),ThisItem.Expiration) & " DAYS", "IN " & DateDiff(Today(),ThisItem.Expiration) & " DAYS") & 
                                            "</div>
                                            <div style='font-size:11px; margin-top:4px; color:" & If(ThisItem.IsSelected, "#1D4ED8", "#374151") & ";'>" & Text(ThisItem.Expiration, "dd-mmm-yyyy") & "</div>
                                        </div>
                                    </div>"
                                )
                              OnSelect: =Select(Parent)
                              PaddingBottom: =0
                              PaddingLeft: =20
                              PaddingRight: =50
                              PaddingTop: =0
                              Size: =10.5
                              Width: =Parent.TemplateWidth
                  - RightContainer1_4:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        PaddingBottom: =2
                        PaddingLeft: =2
                        PaddingRight: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =If(Or(varDeleteMode, And(ItemList.Size = ScreenSize.Small, !varNewMode, !varIsItemSelected)), false, true)
                        Width: =Parent.Width/2
                        X: =40
                        Y: =40
                      Children:
                        - Container1_4:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              FillPortions: =0
                              Height: =60
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              LayoutMinHeight: =40
                            Children:
                              - Container21_4:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =60
                                    PaddingLeft: =If(ItemList.Size = ScreenSize.Small, 8, 12)
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                  Children:
                                    - BackIcon1_4:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Icon: ="ArrowLeft"
                                          Layout: ='ButtonCanvas.Layout'.IconBefore
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =ResetForm(Form1_4); Set(varNewMode, false); Set(varEditMode, false); Set(varCurrentItem, First(Gallery1.AllItems)); Set(varIsItemSelected, false)
                                          Text: ="Back"
                                          Visible: =If(And(ItemList.Size = ScreenSize.Small, !varDeleteMode), true, false)
                                          Width: =If(ItemList.Size = ScreenSize.Small, 75, 96)
                                    - NewRecordButton1_4:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Primary
                                          Icon: ="Add"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =NewForm(Form1_4); Set(varNewMode, true); Set(varEditMode, false)
                                          Text: ="New"
                                          Visible: =If(ItemList.Size = ScreenSize.Small, false, And(!varNewMode, !varDeleteMode))
                                          Width: =If(ItemList.Size = ScreenSize.Small, 75, 96)
                                    - EditButton1_4:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Icon: ="Edit"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =Set(varEditMode, true); Set(varNewMode, false)
                                          Text: ="Edit"
                                          Visible: =And(!varNewMode, !varDeleteMode)
                                          Width: =If(ItemList.Size = ScreenSize.Small, 75, 90)
                                    - DeleteButton1_4:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Icon: ="Delete"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =Set(varDeleteMode, true)
                                          Text: ="Delete"
                                          Visible: =And(!varNewMode, !varDeleteMode)
                                          Width: =If(ItemList.Size = ScreenSize.Small, 75, 70)
                                    - ArchiveExpiredButton_1:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =ForAll(
                                                Filter(Inventories, Expiration < Today()),
                                                Patch(
                                                    Expireds,
                                                    Defaults(Expireds),
                                                    {
                                                        Name: Name,
                                                        Lot: batch,
                                                        expiration: Expiration,
                                                        quantity: Quantity,
                                                        manufacturer: Manufacturer_Lookup,
                                                        GTIN: ItemID,
                                                        archived_date: Today(),
                                                        Archived_reason: "Expired"
                                                    }
                                                )
                                            );
                                            RemoveIf(Inventories, Expiration < Today());

                                            Notify("Expired items archived successfully", NotificationType.Success)
                                          Text: ="Archive Expired Items"
                                          VerticalAlign: =
                                          Width: =150
                        - MainContainer1_4:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =16
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              LayoutMinHeight: =150
                              LayoutMinWidth: =300
                              LayoutOverflowY: =LayoutOverflow.Scroll
                              PaddingTop: =8
                            Children:
                              - Form1_4:
                                  Control: Form@2.4.4
                                  Layout: Vertical
                                  Properties:
                                    BorderColor: =RGBA(243, 242, 241, 1)
                                    BorderStyle: =BorderStyle.None
                                    DataSource: =Inventories
                                    DefaultMode: =If(varNewMode, FormMode.New, varEditMode, FormMode.Edit, FormMode.View)
                                    FillPortions: =0.85
                                    Item: =varCurrentItem
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =100
                                    LayoutMinWidth: =300
                                    NumberOfColumns: =2
                                    OnFailure: |-
                                      =Notify(
                                                  "Error: " & If(
                                                      varNewMode,
                                                      "Failed to create item: ",
                                                      "Failed to update item: "
                                                  ) & Self.Error,
                                                  NotificationType.Error,
                                                  5000
                                              )
                                    OnSuccess: |-
                                      =With(
                                          { wasNewMode: varNewMode },
                                          Set(varCurrentItem, Self.LastSubmit);
                                          Set(varIsItemSelected, false);
                                          Set(varNewMode, false);
                                          Set(varEditMode, false);
                                          Notify(
                                              If(wasNewMode, "New item created successfully", "Item updated successfully"),
                                              NotificationType.Success,
                                              3000
                                          );
                                          ResetForm(Form1_4);
                                          Set(varBarcodeData, Blank())
                                      )
                                    Width: =Parent.Width
                                  Children:
                                    - Name_DataCard1_2:
                                        Control: TypedDataCard@1.0.7
                                        Variant: TextualEdit
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          DataField: ="cr31c_name"
                                          Default: =ThisItem.Name
                                          DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Name)
                                          MaxLength: =DataSourceInfo([@Inventories], DataSourceInfo.MaxLength, Name)
                                          Required: =false
                                          Update: =DataCardValue1_2.Value
                                          Width: =459
                                          X: =0
                                          Y: =0
                                        Children:
                                          - DataCardKey1_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldName
                                              Properties:
                                                Height: =22
                                                Text: =Parent.DisplayName
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width - 48
                                                Wrap: =false
                                                X: =24
                                                Y: =10
                                          - DataCardValue1_2:
                                              Control: TextInput@0.0.54
                                              MetadataKey: FieldValue
                                              Properties:
                                                AccessibleLabel: =Parent.DisplayName
                                                DisplayMode: =Parent.DisplayMode
                                                Mode: ='TextInputCanvas.Mode'.SingleLine
                                                Required: =Parent.Required
                                                ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                Value: =Parent.Default
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardKey1_2.Y + DataCardKey1_2.Height + 4
                                          - ErrorMessage1_2:
                                              Control: Text@0.0.51
                                              MetadataKey: ErrorMessage
                                              Properties:
                                                Height: =30
                                                Text: =Parent.Error
                                                Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardValue1_2.Y + DataCardValue1_2.Height
                                          - StarVisible1_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldRequired
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Height: =30
                                                Text: ="*"
                                                Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =30
                                                Y: =DataCardKey1_2.Y
                                    - Barcode_DataCard1_2:
                                        Control: TypedDataCard@1.0.7
                                        Variant: TextualEdit
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          DataField: ="cr31c_barcode"
                                          Default: =ThisItem.Barcode
                                          DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Barcode)
                                          MaxLength: =DataSourceInfo([@Inventories], DataSourceInfo.MaxLength, Barcode)
                                          Required: =false
                                          Update: =BarcodeScanner1_2.Value
                                          Width: =459
                                          X: =1
                                          Y: =0
                                        Children:
                                          - DataCardKey2_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldName
                                              Properties:
                                                Height: =22
                                                Text: =Parent.DisplayName
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width - 48
                                                Wrap: =false
                                                X: =24
                                                Y: =10
                                          - BarcodeScanner1_2:
                                              Control: TextInput@0.0.54
                                              MetadataKey: FieldValue
                                              Properties:
                                                AccessibleLabel: =Parent.DisplayName
                                                DisplayMode: =Parent.DisplayMode
                                                Mode: ='TextInputCanvas.Mode'.SingleLine
                                                OnChange: |-
                                                  =If(
                                                                          Len(BarcodeScanner1_2.Value) >= 17,
                                                                          Set(varBarcodeData,
                                                                              With(
                                                                                  {
                                                                                      BC: BarcodeScanner1_2.Value,
                                                                                      IsValid: And(StartsWith(BarcodeScanner1_2.Value, "01"), Len(BarcodeScanner1_2.Value) >= 17)
                                                                                  },
                                                                                  If(IsValid,
                                                                                      {
                                                                                          ItemID: Mid(BC, 3, 14),
                                                                                          Expiration: If(
                                                                                              And(Len(BC) >= 25, Mid(BC, 17, 2) = "17"),
                                                                                              Mid(BC, 19, 6),
                                                                                              ""
                                                                                          ),
                                                                                          Batch: If(
                                                                                              And(Len(BC) >= 27, Mid(BC, 25, 2) = "10"),
                                                                                              // Extract batch until we hit "91" or end of string
                                                                                              With(
                                                                                                  {
                                                                                                      BatchStart: 27,
                                                                                                      AI91Position: If(
                                                                                                          Find("91", BC, 27) > 0,
                                                                                                          Find("91", BC, 27),
                                                                                                          Len(BC) + 1
                                                                                                      )
                                                                                                  },
                                                                                                  Mid(BC, BatchStart, AI91Position - BatchStart)
                                                                                              ),
                                                                                              ""
                                                                                          ),
                                                                                          InternalInfo: If(
                                                                                              Find("91", BC) > 0,
                                                                                              Mid(BC, Find("91", BC) + 2, Len(BC) - Find("91", BC) - 1),
                                                                                              ""
                                                                                          ),
                                                                                          ExpirationFormatted: If(
                                                                                              And(Len(BC) >= 25, Mid(BC, 17, 2) = "17"),
                                                                                              Date(
                                                                                                  2000 + Value(Mid(BC, 19, 2)),
                                                                                                  Value(Mid(BC, 21, 2)),
                                                                                                  Value(Mid(BC, 23, 2))
                                                                                              ),
                                                                                              Blank()
                                                                                          ),
                                                                                          IsValidBarcode: true
                                                                                      },
                                                                                      {
                                                                                          ItemID: "",
                                                                                          Expiration: "",
                                                                                          Batch: "",
                                                                                          InternalInfo: "",
                                                                                          ExpirationFormatted: Blank(),
                                                                                          IsValidBarcode: false
                                                                                      }
                                                                                  )
                                                                              )
                                                                          );
                                                                          If(
                                                                              !varBarcodeData.IsValidBarcode,
                                                                              Notify("Invalid barcode format. Expected GS1 format starting with '01'", NotificationType.Warning)
                                                                          )
                                                                      )
                                                Required: =Parent.Required
                                                ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                Value: =Parent.Default
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardKey2_2.Y + DataCardKey2_2.Height + 4
                                          - ErrorMessage2_2:
                                              Control: Text@0.0.51
                                              MetadataKey: ErrorMessage
                                              Properties:
                                                Height: =30
                                                Text: =Parent.Error
                                                Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =BarcodeScanner1_2.Y + BarcodeScanner1_2.Height
                                          - StarVisible2_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldRequired
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Height: =30
                                                Text: ="*"
                                                Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =30
                                                Y: =DataCardKey2_2.Y
                                    - Batch_DataCard1_2:
                                        Control: TypedDataCard@1.0.7
                                        Variant: TextualEdit
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          DataField: ="cr31c_batch"
                                          Default: =ThisItem.Batch
                                          DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Batch)
                                          MaxLength: =DataSourceInfo([@Inventories], DataSourceInfo.MaxLength, Batch)
                                          Required: =false
                                          Update: =DataCardValue3_2.Value
                                          Width: =459
                                          X: =0
                                          Y: =1
                                        Children:
                                          - DataCardKey3_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldName
                                              Properties:
                                                Height: =22
                                                Text: |-
                                                  ="Batch/Lot #"
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width - 48
                                                Wrap: =false
                                                X: =24
                                                Y: =10
                                          - DataCardValue3_2:
                                              Control: TextInput@0.0.54
                                              MetadataKey: FieldValue
                                              Properties:
                                                AccessibleLabel: =Parent.DisplayName
                                                DisplayMode: =Parent.DisplayMode
                                                Mode: ='TextInputCanvas.Mode'.SingleLine
                                                Required: =Parent.Required
                                                ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                Value: =Parent.Default
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardKey3_2.Y + DataCardKey3_2.Height + 4
                                          - ErrorMessage3_2:
                                              Control: Text@0.0.51
                                              MetadataKey: ErrorMessage
                                              Properties:
                                                Height: =30
                                                Text: =Parent.Error
                                                Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardValue3_2.Y + DataCardValue3_2.Height
                                          - StarVisible3_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldRequired
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Height: =30
                                                Text: ="*"
                                                Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =30
                                                Y: =DataCardKey3_2.Y
                                    - Quantity_DataCard1_2:
                                        Control: TypedDataCard@1.0.7
                                        Variant: NumberEdit
                                        IsLocked: true
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          DataField: ="cr31c_quantity"
                                          Default: =ThisItem.Quantity
                                          DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Quantity)
                                          Required: =false
                                          Update: =Value(DataCardValue4_2.Value)
                                          Width: =459
                                          X: =1
                                          Y: =1
                                        Children:
                                          - DataCardKey5_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldName
                                              Properties:
                                                Height: =22
                                                Text: ="Quantity (case/bx)"
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width - 48
                                                Wrap: =false
                                                X: =24
                                                Y: =10
                                          - DataCardValue4_2:
                                              Control: NumberInput@2.9.12
                                              MetadataKey: FieldValue
                                              Properties:
                                                AccessibleLabel: =Parent.DisplayName
                                                DisplayMode: =Parent.DisplayMode
                                                Max: =Blank()
                                                Min: =Blank()
                                                ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                Value: =Parent.Default
                                                Width: =Parent.Width - 48
