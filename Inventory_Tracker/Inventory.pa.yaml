Screens:
  Inventory:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |-
        =Set(varDefaultMan, Table());
        If(varReturnToInventory,
            Set(varReturnToInventory, false);
            Notify("Product registered! Please process the item again.", NotificationType.Success, 4000)
        );
    Children:
      - Container5:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            PaddingBottom: =8
            PaddingLeft: =8
            PaddingRight: =8
            PaddingTop: =8
            Width: =Parent.Width
          Children:
            - NavBar_2:
                Control: CanvasComponent
                ComponentName: NavBar
                Properties:
                  ActiveFillColor: =App.Theme.Colors.Lighter80
                  ActiveScreen: =App.ActiveScreen
                  ActiveTextColor: =Color.Blue
                  BaseFillColor: =App.Theme.Colors.Darker70
                  Height: =75
                  Items: |
                    =Table(
                        {Label: "Inventory", Screen: Inventory},
                        {Label: "Registration", Screen: Registration},
                        {Label: "Quick Pick", Screen: QuickPick},
                        {Label: "Rapid Scan", Screen: RapidScan},
                        {Label: "Item List", Screen: ItemList},
                        {Label: "Table View", Screen: 'Table View'},
                        {Label: "Inventory Tool", Screen: InventoryTool},
                        {Label: "Archive", Screen: Archive},
                        {Label: "Settings", Screen: Settings}
                    )
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  Width: =Parent.Width
            - ScreenContainer1_4:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(245, 245, 245, 1)
                  Height: =Parent.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =10
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =16
                  Width: =Parent.Width
                Children:
                  - BodyContainer1_4:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =16
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        PaddingBottom: =2
                        PaddingTop: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                      Children:
                        - SidebarContainer1_4:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              FillPortions: =If(And(Inventory.Size = ScreenSize.Small, Or(newMode, isItemSelected)), 0, 5)
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =10
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              PaddingBottom: =10
                              PaddingLeft: =10
                              PaddingRight: =10
                              PaddingTop: =10
                              Visible: |-
                                =If(
                                    Or(
                                        varDeleteMode,
                                        And(
                                            Inventory.Size = ScreenSize.Small,
                                            Or(
                                                varNewMode,
                                                varIsItemSelected
                                            )
                                        )
                                    ),
                                    false,
                                    true
                                )
                            Children:
                              - Container5_5:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    AlignInContainer: =AlignInContainer.SetByContainer
                                    FillPortions: =0
                                    Height: =32
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =5
                                    LayoutJustifyContent: =LayoutJustifyContent.Center
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutWrap: =true
                                    Width: =Parent.Width-30
                                    X: =40
                                    Y: =40
                                  Children:
                                    - ManufacturerDropdown_1:
                                        Control: ComboBox@0.0.51
                                        Properties:
                                          DefaultSelectedItems: =Sort(Distinct(Inventories, Manufacturer_Lookup), Value)
                                          Height: =Parent.Height - 2
                                          InputTextPlaceholder: ="All Manufacturers"
                                          Items: =Sort(Distinct(Inventories, Manufacturer_Lookup), Value)
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnChange: =Set(wSelectedManufacturers, ManufacturerDropdown_1.SelectedItems);
                                          SelectMultiple: =true
                                          Width: =(Parent.Width - Parent.LayoutGap) / 2
                                          X: =50
                                          Y: =40
                                    - ButtonCanvas1_5:
                                        Control: Button@0.0.45
                                        Properties:
                                          Align: =Align.Center
                                          Height: =Parent.Height - 2
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |+
                                            =Set(varShowExpired, !varShowExpired);
                                            If(
                                                varShowExpired,
                                                Notify("Showing expired items only", NotificationType.Information),
                                                Notify("Showing all items", NotificationType.Information)
                                            )

                                          Text: =If(varShowExpired, "Show All", "Expired Only")
                                          VerticalAlign: =Align.Center
                                          Width: =(Parent.Width - Parent.LayoutGap) / 2
                                          X: =40
                                          Y: =40
                              - SearchContainer1_4:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    AlignInContainer: =AlignInContainer.SetByContainer
                                    DropShadow: =DropShadow.None
                                    Fill: =RGBA(245, 245, 245, 1)
                                    FillPortions: =0
                                    Height: =44
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    PaddingRight: =5
                                  Children:
                                    - SearchInput1_4:
                                        Control: TextInput@0.0.54
                                        Properties:
                                          FillPortions: =1
                                          Height: =44
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinWidth: =200
                                          Placeholder: ="Search"
                                          TriggerOutput: ='TextInputCanvas.TriggerOutput'.Keypress
                                          Width: =Parent.Width-50
                              - AddNewContainer1_4:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    AlignInContainer: =AlignInContainer.SetByContainer
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =44
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Visible: =If(Inventory.Size = ScreenSize.Small,true,false)
                                  Children:
                                    - AddNewButton1_4:
                                        Control: Button@0.0.45
                                        Properties:
                                          Align: =Align.Left
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          FillPortions: =1
                                          FontSize: =14
                                          Height: =44
                                          Icon: ="Add"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinWidth: =60
                                          OnSelect: |-
                                            =NewForm(Form1_5); UpdateContext({ newMode: true })
                                          Text: ="New"
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =80
                              - Gallery2:
                                  Control: Gallery@2.15.0
                                  Variant: BrowseLayout_Vertical_ThreeTextVariant_pcfCore
                                  Properties:
                                    BorderColor: =RGBA(243, 242, 241, 1)
                                    FocusedBorderColor: =RGBA(98, 100, 167, 1)
                                    FocusedBorderThickness: =2
                                    Items: "=With(\n    {\n        // Input values from controls\n        wSearchText: Trim(SearchInput1_4.Value),\n        wSelectedManufacturers: ManufacturerDropdown_1.SelectedItems,\n        wShowExpired: varShowExpired\n    },\n    With(\n        {\n            // Step 1: Start with the base data and apply the Search function.\n            // NOTE: The Search() function requires column names to be text strings in quotes.\n            FilteredData: If(\n                IsBlank(wSearchText),\n                Inventories,\n                Search(\n                    Inventories,\n                    wSearchText,\n                    Name, \n                    Barcode, \n                    Batch, \n                    ItemID, \n                    'Item Category'\n                )\n            )\n        },\n        \n        // Step 2: Apply conditional filters on top of the searched data.\n        // NOTE: The Filter() function uses direct column references WITHOUT quotes.\n        SortByColumns(\n            Filter(\n                FilteredData,\n                \n                // Manufacturer Filter: This logic correctly handles a multi-select ComboBox.\n                (IsEmpty(wSelectedManufacturers) || Manufacturer_Lookup in wSelectedManufacturers.Value),\n                \n                // Expired Filter: Applies only if the toggle is on.\n                (Not(wShowExpired) || Expiration < Today())\n            ),\n            \n            // Step 3: Sort the final results.\n            // NOTE: The SortByColumns() function also requires column names in quotes.\n            \"cr31c_name\", SortOrder.Ascending,\n            \"cr31c_expiration\", SortOrder.Ascending\n        )\n    )\n)"
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    OnSelect: |-
                                      =// Screens.Inventory.BodyContainer1_2.SidebarContainer1_2.Table1_2.Properties.OnSelect
                                      If(
                                          !IsBlank(Gallery2.Selected), // Ensure an item is actually selected
                                          Set(varIsItemSelected, true);
                                          Set(varNewMode, false);
                                          Set(varEditMode, true);
                                          Set(varCurrentItem, Gallery2.Selected); // Set the selected item to varCurrentItem
                                          Navigate(Inventory, ScreenTransition.None), // Force a full screen refresh by navigating to itself
                                          Notify("Please select an item to view/edit.", NotificationType.Warning, 3000) // User feedback if no item is selected
                                      )
                                    TemplateFill: |+
                                      =If(
                                          ThisItem.IsSelected,
                                          RGBA(239, 246, 254, 1), // A very light, accessible blue for selection

                                          // If not selected, use status-based tints
                                          If(
                                              !IsBlank(ThisItem.Expiration) And DateValue(ThisItem.Expiration) <= DateAdd(Today(), 7), 
                                              RGBA(254, 242, 242, 1), // Urgent: Very light red
                                              If(
                                                  !IsBlank(ThisItem.Expiration) And DateValue(ThisItem.Expiration) <= DateAdd(Today(), 30),
                                                  RGBA(254, 252, 232, 1), // Caution: Very light yellow
                                                  RGBA(0, 0, 0, 0) // Default: Transparent
                                              )
                                          )
                                      )
                                    TemplatePadding: =5
                                    TemplateSize: =100
                                    Width: =Parent.Width
                                    X: =Parent.X
                                    Y: =Parent.Y
                                  Children:
                                    - HtmlText3:
                                        Control: HtmlViewer@2.1.0
                                        Properties:
                                          AutoHeight: =true
                                          BorderStyle: =BorderStyle.Solid
                                          BorderThickness: =1
                                          DisabledBorderColor: =RGBA(200, 198, 196, 1)
                                          Fill: =RGBA(0, 0, 0, 0)
                                          Font: =Font.'Segoe UI'
                                          Height: =Parent.TemplateHeight
                                          HtmlText: |+
                                            ="<div style='display:flex; justify-content:space-between; align-items:center; font-family:Segoe UI,sans-serif; padding:12px; border-left:5px solid " & 
                                                If(
                                                    ThisItem.IsSelected, 
                                                    "'#2563EB'", // Strong Blue for Selected
                                                    Switch(
                                                        true,
                                                        (!IsBlank(ThisItem.Expiration) And DateValue(ThisItem.Expiration) <= DateAdd(Today(), 7)) Or ThisItem.Quantity < 1, "'#DC2626'",
                                                        (!IsBlank(ThisItem.Expiration) And DateValue(ThisItem.Expiration) <= DateAdd(Today(), 30)) Or (!IsBlank(ThisItem.'Modified On') And DateValue(ThisItem.'Modified On') < DateAdd(Today(), -7)), "'#D97706'",
                                                        "'#A1A1AA'"
                                                    )
                                                ) & 
                                            ";'>
                                                <!-- Left Side: Main Content -->
                                                <div style='flex-grow:1; display:flex; flex-direction:column; padding-right:10px;'>
                                                    <div style='font-size:16px; font-weight:600; color:" & If(ThisItem.IsSelected, "'#1E40AF'", If(!IsBlank(ThisItem.Expiration) And DateValue(ThisItem.Expiration) <= DateAdd(Today(), 7), "'#991B1B'", "#1F2937")) & "; margin-bottom:4px;'>" & ThisItem.Name & "</div>
                                                    <div style='font-size:12px; color:#374151;'>
                                                        <b>Man:</b> " & ThisItem.Manufacturer_Lookup & " &nbsp;&nbsp; <b>Lot:</b> " & ThisItem.Batch & "
                                                    </div>
                                                    <div style='font-size:12px; color:" & If(ThisItem.Quantity < 1, "'#DC2626'", "#374151") & ";'>
                                                        <b>Cat:</b> " & ThisItem.'Item Category' & " &nbsp;&nbsp; <b>Qty:</b> " & ThisItem.Quantity & "
                                                    </div>
                                                </div>

                                                <!-- Right Side: Status Pills -->
                                                <div style='display:flex; flex-direction:column; align-items:flex-end; min-width:100px; gap:5px;'>
                                                    " & 
                                                    If(
                                                        !IsBlank(ThisItem.Expiration),
                                                        "<div style='font-size:11px; font-weight:600; padding:3px 8px; border-radius:12px; text-align:center;
                                                            color:" & 
                                                                // Black text on yellow, otherwise white
                                                                If(DateValue(ThisItem.Expiration) <= DateAdd(Today(), 30) And Not(DateValue(ThisItem.Expiration) <= DateAdd(Today(), 7)), "'#1F2937'", "'#FFFFFF'") & 
                                                            "; background-color:" & 
                                                                Switch(
                                                                    true,
                                                                    DateValue(ThisItem.Expiration) <= DateAdd(Today(), 7), "'#DC2626'", // Red
                                                                    DateValue(ThisItem.Expiration) <= DateAdd(Today(), 30), "'#FBBF24'", // Yellow
                                                                    "'transparent'"
                                                                ) &
                                                        ";'>" & 
                                                            "Exp: " & Text(ThisItem.Expiration, "dd-mmm-yy") & 
                                                        "</div>"
                                                    ) &
                                                    If(
                                                        !IsBlank(ThisItem.'Modified On'),
                                                        "<div style='font-size:11px; font-weight:600; padding:3px 8px; border-radius:12px; text-align:center; 
                                                            color:" & 
                                                                // Black text on yellow, otherwise white
                                                                If(DateValue(ThisItem.'Modified On') < DateAdd(Today(), -7) And Not(DateValue(ThisItem.'Modified On') < DateAdd(Today(), -14)), "'#1F2937'", "'#FFFFFF'") & 
                                                            "; background-color:" &
                                                                Switch(
                                                                    true,
                                                                    DateValue(ThisItem.'Modified On') < DateAdd(Today(), -14), "'#991B1B'", // Dark Red
                                                                    DateValue(ThisItem.'Modified On') < DateAdd(Today(), -7), "'#FBBF24'", // Yellow
                                                                    "'transparent'"
                                                                ) &
                                                        ";'>" &
                                                            "Mod: " & Text(ThisItem.'Modified On', "dd-mmm-yy") & 
                                                        "</div>"
                                                    ) &
                                                "</div>
                                            </div>"
                                          OnSelect: =Select(Parent)
                                          PaddingBottom: =10
                                          PaddingLeft: =10
                                          PaddingRight: =10
                                          PaddingTop: =10
                                          Size: =10.5
                                          Width: =Parent.TemplateWidth
                        - RightContainer1_5:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              FillPortions: =7
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =16
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              PaddingBottom: =2
                              PaddingLeft: =2
                              PaddingRight: =2
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Visible: =If(Or(varDeleteMode, And(Inventory.Size = ScreenSize.Small, !varNewMode, !varIsItemSelected)), false, true)
                              Width: =0
                            Children:
                              - Container1_5:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =RGBA(255, 255, 255, 1)
                                    FillPortions: =0
                                    Height: =60
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =40
                                  Children:
                                    - Container21_5:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =10
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinHeight: =60
                                          PaddingLeft: =If(Inventory.Size = ScreenSize.Small,8,12)
                                          RadiusBottomLeft: =0
                                          RadiusBottomRight: =0
                                          RadiusTopLeft: =0
                                          RadiusTopRight: =0
                                        Children:
                                          - BackIcon1_5:
                                              Control: Button@0.0.45
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                Icon: ="ArrowLeft"
                                                Layout: ='ButtonCanvas.Layout'.IconBefore
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                OnSelect: |-
                                                  =ResetForm(Form1_5); UpdateContext({ newMode: false, editMode: false, CurrentItem: First(Gallery2.AllItems), isItemSelected:false });
                                                Text: ="Back"
                                                Visible: =If(And(Inventory.Size = ScreenSize.Small, !varDeleteMode), true, false)
                                                Width: =If(Inventory.Size = ScreenSize.Small, 75, 96)
                                          - NewRecordButton1_5:
                                              Control: Button@0.0.45
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Appearance: ='ButtonCanvas.Appearance'.Primary
                                                Icon: ="Add"
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                OnSelect: =NewForm(Form1_5); Set( varNewMode, true )
                                                Text: ="New"
                                                Visible: =If(Inventory.Size = ScreenSize.Small, false, And(!newMode, !varDeleteMode))
                                                Width: =If(Inventory.Size = ScreenSize.Small, 75, 96)
                                          - EditButton1_5:
                                              Control: Button@0.0.45
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                Icon: ="Edit"
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                OnSelect: =Set(varEditMode, true); Set(varSelectedRecord, Gallery2.Selected)
                                                Text: ="Edit"
                                                Visible: =And(!newMode, !varDeleteMode)
                                                Width: =If(Inventory.Size = ScreenSize.Small, 75, 90)
                                          - DeleteButton1_5:
                                              Control: Button@0.0.45
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                Icon: ="Delete"
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                OnSelect: =Set(varDeleteMode, true); Set(varSelectedRecord, Gallery2.Selected)
                                                Text: ="Delete"
                                                Visible: =And(!newMode, !varDeleteMode)
                                                Width: =If(Inventory.Size = ScreenSize.Small, 75, 70)
                                          - ArchiveExpiredButton_2:
                                              Control: Button@0.0.45
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Center
                                                LayoutMaxHeight: =
                                                LayoutMaxWidth: =
                                                OnSelect: |-
                                                  =ForAll(
                                                      Filter(Inventories, Expiration < Today() || Quantity <= 0),
                                                      Patch(
                                                          Expireds,
                                                          Defaults(Expireds),
                                                          {
                                                              Name: Name,
                                                              Lot: Batch,
                                                              expiration: Expiration,
                                                              quantity: Quantity,
                                                              manufacturer: Manufacturer_Lookup,
                                                              GTIN: ItemID,
                                                              archived_date: Today(),
                                                              Archived_reason: If(Expiration < Today(), "Expired", "Zero Quantity")
                                                          }
                                                      )
                                                  );
                                                  RemoveIf(Inventories, Expiration < Today() || Quantity <= 0);
                                                  Notify("Expired and zero quantity items archived successfully", NotificationType.Success)
                                                Text: ="Archive Expired Items"
                                                VerticalAlign: =
                                                Width: =150
                              - MainContainer1_5:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =RGBA(255, 255, 255, 1)
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =16
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =150
                                    LayoutMinWidth: =300
                                    LayoutOverflowY: =LayoutOverflow.Scroll
                                    PaddingTop: =8
                                  Children:
                                    - TextCanvas3_2:
                                        Control: Text@0.0.51
                                        Properties:
                                          Align: ="Center"
                                          AlignInContainer: =AlignInContainer.Center
                                          AutoHeight: =true
                                          Fill: |-
                                            =If(
                                                        varDeleteMode,
                                                        RGBA(255, 235, 238, 1), // Light Red for Delete
                                                        Switch(
                                                            Form1_5.Mode,
                                                            FormMode.Edit, RGBA(255, 253, 224, 1), // Light Yellow for Edit
                                                            FormMode.New, RGBA(226, 255, 239, 1),  // Light Green for New
                                                            RGBA(255, 255, 255, 1)                 // Default White for View
                                                        )
                                                    )
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          Size: =20
                                          Text: |-
                                            =Switch(
                                                Form1_5.Mode,
                                                FormMode.View,
                                                "View Mode",
                                                FormMode.Edit,
                                                "Edit Mode",
                                                FormMode.New,
                                                "New Record"
                                            )
                                          Width: =110
                                          X: =40
                                          Y: =40
                                    - Form1_5:
                                        Control: Form@2.4.4
                                        Layout: Vertical
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          BorderStyle: =BorderStyle.None
                                          DataSource: =Inventories
                                          DefaultMode: =If(varNewMode, FormMode.New, varEditMode, FormMode.Edit, FormMode.View)
                                          FillPortions: =0.85
                                          Item: =varCurrentItem
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinHeight: =100
                                          LayoutMinWidth: =300
                                          NumberOfColumns: =2
                                          OnFailure: |-
                                            =Notify(
                                                        "Error: " & If(
                                                            varNewMode,
                                                            "Failed to create item: ",
                                                            "Failed to update item: "
                                                        ) & Self.Error,
                                                        NotificationType.Error,
                                                        5000
                                                    )
                                          OnSuccess: |-
                                            =// Screens.Inventory.BodyContainer1_2.RightContainer1_2.MainContainer1_2.Form1_2.Properties.OnSuccess
                                            Set(varCurrentItem, Self.LastSubmit);
                                                    // REMOVED: Set(varIsItemSelected, false); // This was causing the issue
                                                    Set(varNewMode, false);
                                                    Set(varEditMode, false);
                                                    Notify(
                                                        If(varNewMode, "New item created successfully", "Item updated successfully"),
                                                        NotificationType.Success,
                                                        3000
                                                    );
                                                    ResetForm(Form1_5);
                                                    Set(varBarcodeData, Blank())
                                          Width: =Parent.Width
                                        Children:
                                          - Name_DataCard1_3:
                                              Control: TypedDataCard@1.0.7
                                              Variant: TextualEdit
                                              Properties:
                                                BorderColor: =RGBA(243, 242, 241, 1)
                                                DataField: ="cr31c_name"
                                                Default: =ThisItem.Name
                                                DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Name)
                                                MaxLength: =DataSourceInfo([@Inventories], DataSourceInfo.MaxLength, Name)
                                                Required: =false
                                                Update: =DataCardValue1_3.Value
                                                Width: =459
                                                X: =0
                                                Y: =0
                                              Children:
                                                - DataCardKey1_3:
                                                    Control: Text@0.0.51
                                                    MetadataKey: FieldName
                                                    Properties:
                                                      Height: =22
                                                      Text: =Parent.DisplayName
                                                      Weight: ='TextCanvas.Weight'.Semibold
                                                      Width: =Parent.Width - 48
                                                      Wrap: =false
                                                      X: =24
                                                      Y: =10
                                                - DataCardValue1_3:
                                                    Control: TextInput@0.0.54
                                                    MetadataKey: FieldValue
                                                    Properties:
                                                      AccessibleLabel: =Parent.DisplayName
                                                      DisplayMode: =Parent.DisplayMode
                                                      Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                                                      Required: =Parent.Required
                                                      ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                      Value: =Parent.Default
                                                      Width: =Parent.Width - 48
                                                      X: =24
                                                      Y: =DataCardKey1_3.Y + DataCardKey1_3.Height + 4
                                                - ErrorMessage1_3:
                                                    Control: Text@0.0.51
                                                    MetadataKey: ErrorMessage
                                                    Properties:
                                                      Height: =30
                                                      Text: =Parent.Error
                                                      Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                                      Width: =Parent.Width - 48
                                                      X: =24
                                                      Y: =DataCardValue1_3.Y + DataCardValue1_3.Height
                                                - StarVisible1_3:
                                                    Control: Text@0.0.51
                                                    MetadataKey: FieldRequired
                                                    Properties:
                                                      Align: ='TextCanvas.Align'.Center
                                                      Height: =30
                                                      Text: ="*"
                                                      Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                                      Width: =30
                                                      Y: =DataCardKey1_3.Y
                                          - Barcode_DataCard1_3:
                                              Control: TypedDataCard@1.0.7
                                              Variant: TextualEdit
                                              Properties:
