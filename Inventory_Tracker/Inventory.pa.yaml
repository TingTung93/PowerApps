                                                - BarcodeScanner1_3:
                                                    Control: TextInput@0.0.54
                                                    MetadataKey: FieldValue
                                                    Properties:
                                                      AccessibleLabel: =Parent.DisplayName
                                                      DisplayMode: =Parent.DisplayMode
                                                      Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                                                      OnChange: |-
                                                        =// Barcode for testing: 013038290221261510519830017251117300100
                                                        // Clean the barcode
                                                        Set(cleanedBarcode, Substitute(Substitute(BarcodeInput_Fallback.Text, "(", ""), ")", ""));

                                                        // --- EXTRACTION LOGIC (PROCEDURAL & RELIABLE - NO REGEX) ---

                                                        // 1. Extract GTIN (AI 01)
                                                        // GTIN is always first and has a fixed length.
                                                        Set(gtin, If(StartsWith(cleanedBarcode, "01"), Mid(cleanedBarcode, 3, 14), ""));

                                                        // 2. Extract Expiration Date (AI 17) - using Find() and Mid()
                                                        Set(startOfExpiryAI, Find("17", cleanedBarcode));
                                                        Set(expiry,
                                                            If(startOfExpiryAI > 0,
                                                                // The expiry date is always 6 digits long after the "17"
                                                                Mid(cleanedBarcode, startOfExpiryAI + 2, 6),
                                                                "" // If "17" is not found, return blank
                                                            )
                                                        );

                                                        // 3. Extract Batch Number (AI 10) - using Find() and Mid()
                                                        Set(startOfBatchAI, Find("10", cleanedBarcode));
                                                        If(startOfBatchAI > 0,
                                                            // We found "10". Now find the start of the next AI after it.
                                                            Set(stringAfterBatch, Mid(cleanedBarcode, startOfBatchAI + 2));

                                                            // Find the positions of the next possible AIs within the remaining string.
                                                            Set(pos17, Find("17", stringAfterBatch));
                                                            Set(pos30, Find("30", stringAfterBatch));

                                                            // Determine the length of the batch data.
                                                            Set(batchLength,
                                                                Coalesce(
                                                                    If(pos17 > 0, pos17 - 1),
                                                                    If(pos30 > 0, pos30 - 1),
                                                                    Len(stringAfterBatch) // If no other AI is found, take to the end
                                                                )
                                                            );

                                                            // Extract the batch number using the calculated length.
                                                            Set(batch, Left(stringAfterBatch, batchLength));
                                                        ,
                                                            // If "10" was not found, set batch to blank.
                                                            Set(batch, "")
                                                        );


                                                        // --- YOUR EXISTING FORM LOGIC (UNCHANGED) ---

                                                        // Format expiration date
                                                        Set(tempDate, Blank());
                                                        If(!IsBlank(expiry),
                                                           Set(expiryYear, "20" & Left(expiry, 2));
                                                           Set(expiryMonth, Mid(expiry, 3, 2));
                                                           Set(expiryDay, Right(expiry, 2));
                                                           Set(tempDate, Date(Value(expiryYear), Value(expiryMonth), Value(expiryDay)))
                                                        );

                                                        // Check if barcode exists and perform GTIN lookup concurrently
                                                        Concurrent(
                                                           Set(existingInventory, LookUp(Inventories, cr31c_barcode = BarcodeInput_Fallback.Text)),
                                                           Set(varProductLookup, LookUp(GTIN_Lookups, GTIN = gtin))
                                                        );

                                                        // Set form mode...
                                                        If(IsBlank(existingInventory),
                                                           If(!IsBlank(gtin),
                                                              If(!IsBlank(varProductLookup),
                                                                 NewForm(InventoryForm_1);
                                                                 Set(varProductName, varProductLookup.ItemName);
                                                                 Set(varManufacturer, varProductLookup.ItemManufacturer);
                                                                 SetFocus(DataCardValue4_3),

                                                                 Set(varRegistrationGTIN, gtin);
                                                                 Set(varRegistrationBatch, batch);
                                                                 Set(varRegistrationExpiry, tempDate); //this line is still broken. Incompatible type. We can't evaluate your formula because the context variable types are incompatible with the types of values in other places in your app.
                                                                 Set(varRegistrationBarcode, BarcodeInput_Fallback.Text);
                                                                 Set(varReturnToInventory, true);
                                                                 Navigate(Registration, ScreenTransition.None);
                                                                 Notify("Unknown product - Please register it first", NotificationType.Warning, 3000)
                                                              ),
                                                              NewForm(InventoryForm_1);
                                                           ),
                                                           EditForm(InventoryForm_1);
                                                           SetFocus(DataCardValue4_3)
                                                        )
