                        OnFailure: =Notify("Cannot save. Please check if there are errors in the form.", NotificationType.Error)
                        OnSuccess: |-
                          =UpdateContext({ CurrentItem: Self.LastSubmit, isItemSelected: false });
                          Notify("Product registered! You can now add it to inventory.", NotificationType.Success);
                          ResetForm(Form1_3_QP);
                          Set(varShowRegistrationPopup, false);
                          Set(varMatchedGTIN, Self.LastSubmit);
                          NewForm(InventoryForm_1);
                        Width: =Parent.Width
                      Children:
                        - DataCard1_1_QP:
                            Control: TypedDataCard@1.0.7
                            Variant: BlankCard
                            Properties:
                              BorderColor: =RGBA(243, 242, 241, 1)
                              Fill: =RGBA(214, 221, 224, 1)
                              Height: =77
                              Width: =459
                              X: =0
                              Y: =0
                            Children:
                              - BarcodeScannerRegistration_1_QP:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Appearance: ='TextInputCanvas.Appearance'.FilledDarker
                                    BasePaletteColor: =RGBA(8, 222, 8, 1)
                                    Fill: =RGBA(152, 208, 70, 1)
                                    OnChange: |
                                      =// OnChange property of BarcodeScannerRegistration_1_QP

                                      // 1. Parse the scanned barcode data
                                      Set(
                                          varBarcodeData,
                                          With(
                                              {BC: Self.Value},
                                              {
                                                  ItemID: Mid(BC, 3, 14),
                                                  Expiration: Mid(BC, 19, 6),
                                                  Batch: Mid(BC, 27, Len(BC) - 26),
                                                  ExpirationFormatted: Date(
                                                      2000 + Value(Mid(BC, 19, 2)),
                                                      Value(Mid(BC, 21, 2)),
                                                      Value(Mid(BC, 23, 2))
                                                  )
                                              }
                                          )
                                      );

                                      // 2. Look up the item in the GTIN_Lookups data source
                                      Set(
                                          varExistingItem,
                                          LookUp(GTIN_Lookups, cr31c_gtin = varBarcodeData.ItemID)
                                      );

                                      // 3. Check if the item was found and update the form accordingly
                                      If(
                                          !IsBlank(varExistingItem),
                                          // 3a. If the item EXISTS:
                                          // - Reset form from any prior state (like New mode).
                                          // - Set modes to View/Display.
                                          // - Set the form's item to the record we just found.
                                          UpdateContext({
                                              newMode: false,
                                              editMode: false,
                                              isItemSelected: true,
                                              CurrentItem: varExistingItem
                                          });
                                          Notify(
                                              "Existing item found: " & varExistingItem.cr31c_name,
                                              NotificationType.Information,
                                              3000
                                          ),

                                          // 3b. If the item is NEW:
                                          // - Put the form into New mode to accept a new record.
                                          UpdateContext({
                                              newMode: true,
                                              editMode: false,
                                              isItemSelected: false,
                                              CurrentItem: Blank() // Ensure form's item is blank for new entry
                                          });
                                          NewForm(Form1_3_QP);
                                          Notify(
                                              "This is a new item. Please fill out the registration form.",
                                              NotificationType.Warning,
                                              3000
                                          )
                                      );
                                    Placeholder: ="Barcode for item to be registered"
