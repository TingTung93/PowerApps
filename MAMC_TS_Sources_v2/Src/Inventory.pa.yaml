            - DeleteConfirmDialogContainer1_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  Visible: =varDeleteMode
                  Width: =0
                  X: =40
                  Y: =40
                Children:
                  - ConfirmDeleteLabelContainer1_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        DropShadow: =DropShadow.None
                        LayoutAlignItems: =LayoutAlignItems.End
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        PaddingBottom: =20
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                      Children:
                        - TextCanvas1_2:
                            Control: Text@0.0.51
                            Properties:
                              Align: ="Center"
                              AlignInContainer: =AlignInContainer.Center
                              AutoHeight: =true
                              Fill: =RGBA(215, 58, 60, 0.52)
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              Size: =30
                              Text: ="Are you sure you want to delete '" & varSelectedRecord.Name & "'?"
                              Width: =Parent.Width
                  - ConfirmDeleteButtonBarContainer1_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =15
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutWrap: =true
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                      Children:
                        - ConfirmDeleteButton1_2:
                            Control: Button@0.0.45
                            Properties:
                              AccessibleLabel: ="Delete"
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =If(
                                    varSelectedRecord.Quantity <= 0,
                                    // --- ARCHIVE LOGIC ---
                                    // If quantity is 0 or less, patch to Expireds and then remove.
                                    With(
                                        {archivedRecord: varSelectedRecord},
                                        Patch(
                                            Expireds,
                                            Defaults(Expireds),
                                            {
                                                Name: archivedRecord.Name,
                                                Lot: archivedRecord.Batch,
                                                expiration: archivedRecord.Expiration,
                                                quantity: archivedRecord.Quantity,
                                                manufacturer: archivedRecord.Manufacturer_Lookup,
                                                GTIN: archivedRecord.ItemID,
                                                archived_date: Today(),
                                                Archived_reason: "Zero Quantity"
                                            }
                                        );
                                        Remove(Inventories, archivedRecord);

                                        If(
                                            IsEmpty(Errors(Inventories, archivedRecord)),
                                            // Success actions for archiving
                                            Notify("Item with zero quantity archived successfully.", NotificationType.Success, 3000);
                                            Set(varIsItemSelected, false);
                                            Set(varNewMode, false);
                                            Set(varEditMode, false);
                                            Set(varDeleteMode, false);
                                            Set(varCurrentItem, Blank());
                                            ResetForm(Form1_2),
                                            // Failure action for archiving
                                            Notify("Failed to archive item: " & First(Errors(Inventories, archivedRecord)).Message, NotificationType.Error, 5000)
                                        )
                                    ),
                                    // --- DELETE LOGIC (Original) ---
                                    // If quantity is greater than 0, perform the original delete action.
                                    With(
                                        {recordToDelete: varSelectedRecord},
                                        Remove(
                                            Inventories,
                                            recordToDelete
                                        );
                                        If(
                                            IsEmpty(
                                                Errors(
                                                    Inventories,
                                                    recordToDelete
                                                )
                                            ),
                                            // Success actions for deleting
                                            Set(varIsItemSelected, false);
                                            Set(varNewMode, false);
                                            Set(varEditMode, false);
                                            Set(varDeleteMode, false);
                                            Set(varCurrentItem, Blank());
                                            ResetForm(Form1_2);
                                            Notify(
                                                "Item deleted successfully.",
                                                NotificationType.Success,
                                                3000
                                            ),
                                            // Failure action for deleting
                                            Notify(
                                                "Failed to delete item: " & First(
                                                    Errors(
                                                        Inventories,
                                                        recordToDelete
                                                    )
                                                ).Message,
                                                NotificationType.Error,
                                                5000
                                            )
                                        )
                                    )
                                )
                              Text: ="Delete"
                        - CancelDeleteButton1_2:
                            Control: Button@0.0.45
                            Properties:
                              AccessibleLabel: ="Cancel"
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: =Set(varDeleteMode, false)
                              Text: ="Cancel"
