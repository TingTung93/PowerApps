                      Children:
                        - Container5_4:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              AlignInContainer: =AlignInContainer.SetByContainer
                              FillPortions: =0
                              Height: =32
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =5
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              LayoutWrap: =true
                              Width: =Parent.Width-30
                              X: =40
                              Y: =40
                            Children:
                              - ManufacturerDropdown:
                                  Control: ComboBox@0.0.51
                                  Properties:
                                    DefaultSelectedItems: =Sort(Distinct(Inventories, Manufacturer_Lookup), Value)
                                    Height: =Parent.Height - 2
                                    InputTextPlaceholder: ="All Manufacturers"
                                    Items: =Sort(Distinct(Inventories, Manufacturer_Lookup), Value)
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    OnChange: =Set(wSelectedManufacturers, ManufacturerDropdown.SelectedItems);
                                    SelectMultiple: =true
                                    Width: =(Parent.Width - Parent.LayoutGap) / 2
                                    X: =50
                                    Y: =40
                              - ButtonCanvas1_4:
                                  Control: Button@0.0.45
                                  Properties:
                                    Align: =Align.Center
                                    Height: =Parent.Height - 2
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    OnSelect: |+
                                      =Set(varShowExpired, !varShowExpired);
                                      If(
                                          varShowExpired,
                                          Notify("Showing expired items only", NotificationType.Information),
                                          Notify("Showing all items", NotificationType.Information)
                                      )

                                    Text: =If(varShowExpired, "Show All", "Expired Only")
                                    VerticalAlign: =Align.Center
                                    Width: =(Parent.Width - Parent.LayoutGap) / 2
                                    X: =40
                                    Y: =40
                        - SearchContainer1_2:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              AlignInContainer: =AlignInContainer.SetByContainer
                              DropShadow: =DropShadow.None
                              Fill: =gblTheme.Background
                              FillPortions: =0
                              Height: =44
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              PaddingRight: =5
                            Children:
                              - SearchInput1_2:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    FillPortions: =1
                                    Height: =44
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinWidth: =200
                                    Placeholder: ="Search"
                                    TriggerOutput: ='TextInputCanvas.TriggerOutput'.Keypress
                                    Width: =Parent.Width-50
                        - AddNewContainer1_2:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              AlignInContainer: =AlignInContainer.SetByContainer
                              DropShadow: =DropShadow.None
                              FillPortions: =0
                              Height: =44
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Visible: =If(Inventory.Size = ScreenSize.Small,true,false)
                            Children:
                              - AddNewButton1_2:
                                  Control: Button@0.0.45
                                  Properties:
                                    Align: =Align.Left
                                    AlignInContainer: =AlignInContainer.Stretch
                                    Appearance: ='ButtonCanvas.Appearance'.Transparent
                                    FillPortions: =1
                                    FontSize: =14
                                    Height: =44
                                    Icon: ="Add"
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinWidth: =60
                                    OnSelect: |-
                                      =NewForm(Form1_2); UpdateContext({ newMode: true })
                                    Text: ="New"
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =80
                        - Gallery2:
                            Control: Gallery@2.15.0
                            Variant: BrowseLayout_Vertical_ThreeTextVariant_pcfCore
                            Properties:
                              BorderColor: =gblTheme.Border
                              FocusedBorderColor: =gblTheme.Primary
                              FocusedBorderThickness: =2
                              Items: "=With(\n    {\n        // Input values from controls\n        wSearchText: Trim(SearchInput1_2.Value),\n        wSelectedManufacturers: ManufacturerDropdown.SelectedItems,\n        wShowExpired: varShowExpired\n    },\n    With(\n        {\n            // Step 1: Start with the base data and apply the Search function.\n            // NOTE: The Search() function requires column names to be text strings in quotes.\n            FilteredData: If(\n                IsBlank(wSearchText),\n                Inventories,\n                Search(\n                    Inventories,\n                    wSearchText,\n                    Name, \n                    Barcode, \n                    Batch, \n                    ItemID, \n                    'Item Category'\n                )\n            )\n        },\n        \n        // Step 2: Apply conditional filters on top of the searched data.\n        // NOTE: The Filter() function uses direct column references WITHOUT quotes.\n        SortByColumns(\n            Filter(\n                FilteredData,\n                \n                // Manufacturer Filter: This logic correctly handles a multi-select ComboBox.\n                (IsEmpty(wSelectedManufacturers) || Manufacturer_Lookup in wSelectedManufacturers.Value),\n                \n                // Expired Filter: Applies only if the toggle is on.\n                (Not(wShowExpired) || Expiration < Today())\n            ),\n            \n            // Step 3: Sort the final results.\n            // NOTE: The SortByColumns() function also requires column names in quotes.\n            \"cr31c_name\", SortOrder.Ascending,\n            \"cr31c_expiration\", SortOrder.Ascending\n        )\n    )\n)"
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =// Screens.Inventory.BodyContainer1_2.SidebarContainer1_2.Table1_2.Properties.OnSelect
                                If(
                                    !IsBlank(Gallery2.Selected), // Ensure an item is actually selected
                                    Set(varIsItemSelected, true);
                                    Set(varNewMode, false);
                                    Set(varEditMode, true);
                                    Set(varCurrentItem, Gallery2.Selected); // Set the selected item to varCurrentItem
                                    Navigate(Inventory, ScreenTransition.None), // Force a full screen refresh by navigating to itself
                                    Notify("Please select an item to view/edit.", NotificationType.Warning, 3000) // User feedback if no item is selected
                                )
                              Width: =Parent.Width
                              X: =Parent.X
                              Y: =Parent.Y
                            Children:
                              - Title4:
                                  Control: FluentV8/Label@1.8.6
                                  Properties:
                                    FontWeight: =FontWeight.Semibold
                                    Height: =24
                                    OnSelect: =Select(Parent)
                                    TabIndex: =-1
                                    Text: =ThisItem.Name
                                    VerticalAlignment: =VerticalAlign.Top
                                    Width: =328
                                    X: =12
                                    Y: =2
                              - Subtitle2:
                                  Control: FluentV8/Label@1.8.6
                                  Properties:
                                    FontSize: =9
                                    FontWeight: =FontWeight.Normal
                                    Height: =24
                                    OnSelect: =Select(Parent)
                                    TabIndex: =-1
                                    Text: |-
                                      ="Man: "& ThisItem.Manufacturer_Lookup
                                    VerticalAlignment: =VerticalAlign.Top
                                    Width: =Title4.Width
                                    X: =Title4.X
                                    Y: =Title4.Y + Title4.Height - 6
                              - TextCanvas4:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: |-
                                      =Switch(
                                          true,
                                          ThisItem.Quantity < 1,
                                          RGBA(220, 38, 38, 1),     // Red for expired
                                          RGBA(68, 68, 68, .0)       // Dark gray for normal
                                      )
                                    Height: =28
                                    Text: |-
                                      ="Quantity: " & ThisItem.Quantity&" "&LookUp(GTIN_Lookups,ThisItem.ItemID=GTIN, 'Unit Quantities')
                                    VerticalAlign: =VerticalAlign.Middle
                                    X: =340
                                    Y: =3
                              - TextCanvas4_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =23
                                    Text: |-
                                      ="Category: " & ThisItem.'Item Category'
                                    Width: =197
                                    X: =340
                                    Y: =51
                              - TextCanvas4_2:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: |-
                                      =Switch(
                                          true,
                                          ThisItem.Expiration < Today(),
                                          RGBA(220, 38, 38, 1),     // Red for expired
                                          ThisItem.Expiration <= DateAdd(Today(), 7),
                                          RGBA(234, 88, 12, .2),     // Orange for expiring soon
                                          ThisItem.Expiration <= DateAdd(Today(), 30),
                                          RGBA(251, 191, 36, .2),    // Yellow for caution
                                          RGBA(68, 68, 68, .2)       // Dark gray for normal
                                      )
                                    Height: =23
                                    Text: |-
                                      ="Exp: " & DateValue(ThisItem.Expiration,"en")
                                    Width: =115
                                    X: =12
                                    Y: =51
                              - TextCanvas4_3:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =23
                                    Text: |-
                                      ="Last Modified: " & DateValue(ThisItem.'Modified On', "en")
                                    Width: =168
                                    X: =161
                                    Y: =51
                              - TextCanvas4_4:
                                  Control: Text@0.0.51
                                  Properties:
                                    AutoHeight: =true
                                    Height: =18
                                    Text: |-
                                      ="Lot: " & ThisItem.Batch
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =275
                                    X: =161
                                    Y: =31
                              - Rectangle3:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    BorderColor: =RGBA(53, 61, 63, 1)
                                    BorderThickness: =1
                                    DisabledFill: =RGBA(0,0,0,0)
                                    Fill: =If(ThisItem.IsSelected, RGBA(98, 100, 167, 0.2), RGBA(0, 0, 0, 0))
                                    FocusedBorderColor: =gblTheme.Primary
                                    Height: =Parent.TemplateHeight
                                    HoverFill: =RGBA(98, 100, 167, 0.2)
                                    OnSelect: =Select(Parent)
                                    PressedFill: =RGBA(98, 130, 167, 0.1)
                                    TabIndex: =0
                                    Width: =Parent.TemplateWidth
                  - RightContainer1_2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        FillPortions: =7
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        PaddingBottom: =2
                        PaddingLeft: =2
                        PaddingRight: =2
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Visible: =If(Or(varDeleteMode, And(Inventory.Size = ScreenSize.Small, !varNewMode, !varIsItemSelected)), false, true)
                        Width: =0
                      Children:
                        - Container1_2:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =gblTheme.Background
                              FillPortions: =0
                              Height: =60
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              LayoutMinHeight: =40
                            Children:
                              - Container21_2:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =60
                                    PaddingLeft: =If(Inventory.Size = ScreenSize.Small,8,12)
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                  Children:
                                    - BackIcon1_2:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Icon: ="ArrowLeft"
                                          Layout: ='ButtonCanvas.Layout'.IconBefore
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =ResetForm(Form1_2); UpdateContext({ newMode: false, editMode: false, CurrentItem: First(Gallery2.AllItems), isItemSelected:false });
                                          Text: ="Back"
                                          Visible: =If(And(Inventory.Size = ScreenSize.Small, !varDeleteMode), true, false)
                                          Width: =If(Inventory.Size = ScreenSize.Small, 75, 96)
                                    - NewRecordButton1_2:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Primary
                                          Icon: ="Add"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =NewForm(Form1_2); Set( varNewMode, true )
                                          Text: ="New"
                                          Visible: =If(Inventory.Size = ScreenSize.Small, false, And(!newMode, !varDeleteMode))
                                          Width: =If(Inventory.Size = ScreenSize.Small, 75, 96)
                                    - EditButton1_2:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Icon: ="Edit"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =Set(varEditMode, true); Set(varSelectedRecord, Gallery2.Selected)
                                          Text: ="Edit"
                                          Visible: =And(!newMode, !varDeleteMode)
                                          Width: =If(Inventory.Size = ScreenSize.Small, 75, 90)
                                    - DeleteButton1_2:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Icon: ="Delete"
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: =Set(varDeleteMode, true); Set(varSelectedRecord, Gallery2.Selected)
                                          Text: ="Delete"
                                          Visible: =And(!newMode, !varDeleteMode)
                                          Width: =If(Inventory.Size = ScreenSize.Small, 75, 70)
                                    - ArchiveExpiredButton:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =ForAll(
                                                Filter(Inventories, Expiration < Today() || Quantity <= 0),
                                                Patch(
                                                    Expireds,
                                                    Defaults(Expireds),
                                                    {
                                                        Name: Name,
                                                        Lot: Batch,
                                                        expiration: Expiration,
                                                        quantity: Quantity,
                                                        manufacturer: Manufacturer_Lookup,
                                                        GTIN: ItemID,
                                                        archived_date: Today(),
                                                        Archived_reason: If(Expiration < Today(), "Expired", "Zero Quantity")
                                                    }
                                                )
                                            );
                                            RemoveIf(Inventories, Expiration < Today() || Quantity <= 0);
                                            Notify("Expired and zero quantity items archived successfully", NotificationType.Success)
                                          Text: ="Archive Expired/Depleted Items"
                                          VerticalAlign: =
                                          Width: =200
                        - MainContainer1_2:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =gblTheme.Background
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =16
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              LayoutMinHeight: =150
                              LayoutMinWidth: =300
                              LayoutOverflowY: =LayoutOverflow.Scroll
                              PaddingTop: =8
                            Children:
                              - TextCanvas3:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ="Center"
                                    AlignInContainer: =AlignInContainer.Center
                                    AutoHeight: =true
                                    Fill: |-
                                      =If(
                                                  varDeleteMode,
                                                  RGBA(255, 235, 238, 1), // Light Red for Delete
                                                  Switch(
                                                      Form1_2.Mode,
                                                      FormMode.Edit, RGBA(255, 253, 224, 1), // Light Yellow for Edit
                                                      FormMode.New, RGBA(226, 255, 239, 1),  // Light Green for New
                                                      RGBA(255, 255, 255, 1)                 // Default White for View
                                                  )
                                              )
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    Size: =20
                                    Text: |-
                                      =Switch(
                                          Form1_2.Mode,
                                          FormMode.View,
                                          "View Mode",
                                          FormMode.Edit,
                                          "Edit Mode",
                                          FormMode.New,
                                          "New Record"
                                      )
                                    Width: =110
                                    X: =40
                                    Y: =40
                              - Form1_2:
                                  Control: Form@2.4.4
                                  Layout: Vertical
                                  Properties:
                                    BorderColor: =gblTheme.Border
                                    BorderStyle: =BorderStyle.None
                                    DataSource: =Inventories
                                    DefaultMode: =If(varNewMode, FormMode.New, varEditMode, FormMode.Edit, FormMode.View)
                                    FillPortions: =0.85
                                    Item: =varCurrentItem
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinHeight: =100
                                    LayoutMinWidth: =300
                                    NumberOfColumns: =2
                                    OnFailure: |-
                                      =Notify(
                                                  "Error: " & If(
                                                      varNewMode,
                                                      "Failed to create item: ",
                                                      "Failed to update item: "
                                                  ) & Self.Error,
                                                  NotificationType.Error,
                                                  5000
                                              )
                                    OnSuccess: |-
                                      =// Screens.Inventory.BodyContainer1_2.RightContainer1_2.MainContainer1_2.Form1_2.Properties.OnSuccess
                                      Set(varCurrentItem, Self.LastSubmit);
                                              // REMOVED: Set(varIsItemSelected, false); // This was causing the issue
                                              Set(varNewMode, false);
                                              Set(varEditMode, false);
                                              Notify(
                                                  If(varNewMode, "New item created successfully", "Item updated successfully"),
                                                  NotificationType.Success,
                                                  3000
                                              );
                                              ResetForm(Form1_2);
                                              Set(varBarcodeData, Blank())
                                    Width: =Parent.Width
                                  Children:
                                    - Name_DataCard1_1:
                                        Control: TypedDataCard@1.0.7
                                        Variant: TextualEdit
                                        Properties:
                                          BorderColor: =gblTheme.Border
