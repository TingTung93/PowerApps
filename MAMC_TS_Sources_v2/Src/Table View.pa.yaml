Screens:
  Table View:
    Properties:
      Fill: =gblTheme.Background
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
    Children:
      - ScreenContainer1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =gblTheme.Background
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =gblTheme.Radius
                  RadiusBottomRight: =gblTheme.Radius
                  RadiusTopLeft: =gblTheme.Radius
                  RadiusTopRight: =gblTheme.Radius
                Children:
                  - Header1:
                      Control: Header@0.0.44
                      Properties:
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Title: ="Table View"
            - MainContainer1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  LayoutWrap: =true
                  RadiusBottomLeft: =gblTheme.Radius
                  RadiusBottomRight: =gblTheme.Radius
                  RadiusTopLeft: =gblTheme.Radius
                  RadiusTopRight: =gblTheme.Radius
                  Width: =1000
                Children:
                  - TextCanvas2:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        AutoHeight: =true
                        Fill: =RGBA(180, 214, 250, 1)
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Size: =24
                        Text: ="On this screen, you can click on any item to navigate straight to the inventory page entry to edit information."
                        VerticalAlign: =VerticalAlign.Middle
                  - Table1:
                      Control: Table@1.0.278
                      Properties:
                        DateTimeFormat: ='PowerAppsOneGrid.DateTimeFormat'.ShortDate
                        EnableRangeSelection: ='PowerAppsOneGrid.EnableRangeSelection'.Disable
                        FillPortions: =1
                        Items: =SortByColumns(Inventories,"cr31c_name",SortOrder.Ascending)
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =Parent.Width
                        OnSelect: |-
                          =If(
                                !IsBlank(Table1.Selected),
                                Set(varIsItemSelected, true); 
                                Set(varEditMode, true); 
                                Set(varCurrentItem, Table1.Selected);
                                Navigate(Inventory, ScreenTransition.Fade),
                                Notify("Please select a valid item", NotificationType.Warning)
                            )
                        ReflowBehavior: ='PowerAppsOneGrid.ReflowBehavior'.Reflow
                      Children:
                        - Name1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Name"
                              FieldName: ="cr31c_name"
                              FieldType: ="s"
                              Order: =1
                        - Batch1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Batch"
                              FieldName: ="cr31c_batch"
                              FieldType: ="s"
                              Order: =4
                        - Expiration1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Expiration"
                              FieldName: ="cr31c_expiration"
                              FieldType: ="d"
                              Order: =8
                        - Quantity1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Quantity"
                              FieldName: ="cr31c_quantity"
                              FieldType: ="n"
                              Order: =5
                        - ItemID2:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="ItemID"
                              FieldName: ="cr31c_itemid"
                              FieldType: ="s"
                              Order: =3
                        - Manufacturer_Lookup2:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Manufacturer_Lookup"
                              FieldName: ="cr31c_manufacturer_lookup"
                              FieldType: ="s"
                              Order: =8
                        - Created On1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Created On"
                              FieldName: ="createdon"
                              FieldType: ="d"
                              Order: =9
                        - Modified By1:
                            Control: TableDataField@1.5.0
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Modified By"
                              FieldName: ="modifiedby"
                              FieldType: ="E"
                              Order: =9
                        - Item Category1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Item Category"
                              FieldName: ="cr31c_itemcategory"
                              FieldType: ="s"
                              Order: =11
                        - Modified On1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Modified On"
                              FieldName: ="modifiedon"
                              FieldType: ="d"
                              Order: =10
                        - Units1:
                            Control: TableDataField@1.5.0
                            Variant: textualColumn
                            IsLocked: true
                            Properties:
                              FieldDisplayName: ="Units"
                              FieldName: ="cra16_units"
                              FieldType: ="s"
                              Order: =7
