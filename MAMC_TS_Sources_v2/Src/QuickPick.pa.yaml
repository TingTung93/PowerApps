Screens:
  QuickPick:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: "=// Check if returning from Registration\nIf(varReturnToQuickPick,\n   Set(varReturnToQuickPick, false);\n   // The product should now be registered, so re-scan will find it\n   Notify(\"Product registered! Please scan the barcode again to add to inventory\", NotificationType.Success, 4000),\n   \n   // Normal initialization\n   Set(cleanedBarcode, \"\");\n   Set(gtin, \"\");\n   Set(batch, \"\");\n   Set(expiry, \"\");\n   Set(expiryFormatted, \"\");\n   Set(existingInventory, Blank());\n   NewForm(InventoryForm_1)\n);\n\n// Always set focus to barcode input\nSetFocus(BarcodeInput_1);\n"
    Children:
      - MainContainer_1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - HeaderTitle_1:
                      Control: Header@0.0.44
                      Properties:
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Title: ="Quick Pick - Inventory Management"
                        TitleFontSize: =12
            - FormContainer_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.SetByContainer
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =16
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  PaddingBottom: =15
                  PaddingLeft: =15
                  PaddingRight: =15
                  PaddingTop: =15
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - InventoryForm_1:
                      Control: Form@2.4.4
                      Layout: Vertical
                      Properties:
                        AcceptsFocus: =true
                        BorderColor: =RGBA(243, 242, 241, 1)
                        DataSource: =Inventories
                        DefaultMode: =FormMode.New
                        Item: =existingInventory
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinWidth: =0
                        NumberOfColumns: =2
                        OnFailure: =Notify("There is an unspecified error", NotificationType.Error)
                        OnSuccess: |+
                          =Notify("Entry saved successfully", NotificationType.Success);
                          ResetForm(InventoryForm_1);
                          NewForm(InventoryForm_1);
                          // Clear variables
                          Set(cleanedBarcode, "");
                          Set(gtin, "");
                          Set(batch, "");
                          Set(expiry, "");
                          Set(expiryFormatted, "");
                          Set(existingInventory, Blank());
                          SetFocus(BarcodeInput_1);



                      Children:
                        - BarcodeCard_1:
                            Control: TypedDataCard@1.0.7
                            Variant: PcfCoreTextualEditCard
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 1)
                              BorderThickness: =5
                              DataField: ="cr31c_barcode"
                              Default: =ThisItem.Barcode
                              DisplayName: ="Barcode"
                              Height: |+
                                =120
                              MaxLength: =100
                              Required: =true
                              Update: =BarcodeInput_1.Value
                              Width: =647
                              X: =0
                              Y: =0
                            Children:
                              - BarcodeLabel_1:
                                  Control: FluentV8/Label@1.8.6
                                  MetadataKey: FieldName
                                  Properties:
                                    AutoHeight: =true
                                    FontSize: =9
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Tooltip: =Parent.DisplayName
                                    VerticalAlignment: =VerticalAlign.Bottom
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =10
                              - ExistenceCheck_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    Fill: =If(!IsBlank(existingInventory), Color.LightGreen, Color.Aqua)
                                    Height: =30
                                    Text: |-
                                      =If(BarcodeInput_1.Value = Blank(), "",
                                         If(!IsBlank(existingInventory), 
                                            "Barcode already exists in the inventory. Editing the entry.",
                                            "Barcode is new. You can add it to the inventory.")
                                      )
                                    Width: =Parent.Width-Self.X-BarcodeInput_1.X
                                    X: =83
                                    Y: =10
                              - BarcodeInput_1:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    DisplayMode: =Parent.DisplayMode
                                    Fill: =RGBA(152, 208, 70, 1)
                                    OnChange: "=// --- Enhanced Barcode Logic for Stacked Barcodes (v3) ---\r\n\r\n// This variable will hold the complete barcode string, whether from one scan or two.\r\nUpdateContext({localCompleteBarcode: \"\"});\r\n\r\n// If we are waiting for the second part of a stacked barcode...\r\nIf(\r\n    isWaitingForSecondScan,\r\n    \r\n    // --- THIS IS THE SECOND SCAN ---\r\n    \r\n    // 1. Reconstruct the full barcode string.\r\n    UpdateContext({localCompleteBarcode: ctxFirstScanValue & Self.Value});\r\n    \r\n    // 2. Parse the COMBINED barcode string natively.\r\n    With(\r\n        {\r\n            hasParens: Find(\"(\", localCompleteBarcode) > 0,\r\n            gtinIdx: Find(\"(01)\", localCompleteBarcode),\r\n            expIdx: Find(\"(17)\", localCompleteBarcode),\r\n            batchIdx: Find(\"(10)\", localCompleteBarcode)\r\n        },\r\n        Set(\r\n            gblBarcodeResult,\r\n            If(hasParens,\r\n                {\r\n                    gtin_out: If(gtinIdx > 0, Mid(localCompleteBarcode, gtinIdx + 4, 14), \"\"),\r\n                    expiry_out: If(expIdx > 0, Mid(localCompleteBarcode, expIdx + 4, 6), \"\"),\r\n                    batch_out: If(batchIdx > 0, \r\n                        With({\r\n                            rem: Mid(localCompleteBarcode, batchIdx + 4),\r\n                            nParen: Find(\"(\", Mid(localCompleteBarcode, batchIdx + 4))\r\n                        },\r\n                        If(nParen > 0, Left(rem, nParen - 1), rem)\r\n                        ), \r\n                    \"\")\r\n                },\r\n                {\r\n                    gtin_out: If(StartsWith(localCompleteBarcode, \"01\"), Mid(localCompleteBarcode, 3, 14), \"\"),\r\n                    expiry_out: With({eIdx: Find(\"17\", localCompleteBarcode, 15)}, If(eIdx > 0, Mid(localCompleteBarcode, eIdx + 2, 6), \"\")),\r\n                    batch_out: With({bIdx: Find(\"10\", localCompleteBarcode, 15)}, If(bIdx > 0, Mid(localCompleteBarcode, bIdx + 2), \"\"))\r\n                }\r\n            )\r\n        )\r\n    );\r\n    \r\n    // 3. Reset the state flag.\r\n    UpdateContext({isWaitingForSecondScan: false});\r\n    \r\n,\r\n    // --- THIS IS THE FIRST (or a complete) SCAN ---\r\n    \r\n    // 1. Start processing and parse the initial scan.\r\n    Set(gblIsProcessing, true);\r\n    UpdateContext({localCompleteBarcode: Self.Value});\r\n    Set(\r\n        gblBarcodeResult,\r\n        With(\r\n        {\r\n            hasParens: Find(\"(\", localCompleteBarcode) > 0,\r\n            gtinIdx: Find(\"(01)\", localCompleteBarcode),\r\n            expIdx: Find(\"(17)\", localCompleteBarcode),\r\n            batchIdx: Find(\"(10)\", localCompleteBarcode)\r\n        },\r\n        If(hasParens,\r\n            {\r\n                gtin_out: If(gtinIdx > 0, Mid(localCompleteBarcode, gtinIdx + 4, 14), \"\"),\r\n                expiry_out: If(expIdx > 0, Mid(localCompleteBarcode, expIdx + 4, 6), \"\"),\r\n                batch_out: If(batchIdx > 0, \r\n                    With({\r\n                        rem: Mid(localCompleteBarcode, batchIdx + 4),\r\n                        nParen: Find(\"(\", Mid(localCompleteBarcode, batchIdx + 4))\r\n                    },\r\n                    If(nParen > 0, Left(rem, nParen - 1), rem)\r\n                    ), \r\n                \"\")\r\n            },\r\n            {\r\n                gtin_out: If(StartsWith(localCompleteBarcode, \"01\"), Mid(localCompleteBarcode, 3, 14), \"\"),\r\n                expiry_out: With({eIdx: Find(\"17\", localCompleteBarcode, 15)}, If(eIdx > 0, Mid(localCompleteBarcode, eIdx + 2, 6), \"\")),\r\n                batch_out: With({bIdx: Find(\"10\", localCompleteBarcode, 15)}, If(bIdx > 0, Mid(localCompleteBarcode, bIdx + 2), \"\"))\r\n            }\r\n        )\r\n    )\r\n    );\r\n    \r\n    // 2. Check if the scan was partial (only GTIN was found).\r\n    If(\r\n        !IsBlank(gblBarcodeResult.gtin_out) && IsBlank(gblBarcodeResult.batch_out) && IsBlank(gblBarcodeResult.expiry_out),\r\n        \r\n        // --- PARTIAL SCAN DETECTED ---\r\n        \r\n        // a. Store the value of the first scan.\r\n        Set(ctxFirstScanValue, Self.Value);\r\n        \r\n        // b. Set the app to a \"waiting\" state.\r\n        UpdateContext({isWaitingForSecondScan: true});\r\n        \r\n        // c. Set focus back to the input for the second scan.\r\n        SetFocus(BarcodeInput_1);\r\n        \r\n        ,\r\n        \r\n        // --- COMPLETE SCAN DETECTED ---\r\n        UpdateContext({isWaitingForSecondScan: false})\r\n    )\r\n);\r\n\r\n\r\n// =====[ SHARED LOGIC - RUNS AFTER A COMPLETE SCAN IS ASSEMBLED ]=====\r\n\r\nIf(\r\n    !isWaitingForSecondScan,\r\n    \r\n    // Use the parsed GTIN to check if the product is registered.\r\n    With(\r\n        {\r\n            registeredItem: LookUp(GTIN_Lookups, GTIN = gblBarcodeResult.gtin_out)\r\n        },\r\n        If(\r\n            IsBlank(registeredItem) && !IsBlank(gblBarcodeResult.gtin_out),\r\n            \r\n            // --- ITEM NOT REGISTERED ---\r\n            Notify(\"This item is not registered. Please register it now.\", NotificationType.Warning);\r\n            Navigate(\r\n                Registration,\r\n                ScreenTransition.None,\r\n                {\r\n                    varRegistrationBarcode: localCompleteBarcode,\r\n                    varRegistrationGTIN: gblBarcodeResult.gtin_out,\r\n                    varRegistrationBatch: gblBarcodeResult.batch_out,\r\n                    varRegistrationExpiry: gblBarcodeResult.expiry_out\r\n                }\r\n            ),\r\n            \r\n            // --- ITEM IS ALREADY REGISTERED ---\r\n\r\n            // **KEY FIX:** Use the original, complete barcode string for the inventory lookup.\r\n            Set(\r\n                existingInventory,\r\n                LookUp(Inventories, Barcode = localCompleteBarcode)\r\n            );\r\n            \r\n            // Set the gblCleanedBarcode for saving later, if needed.\r\n            Set(gblCleanedBarcode, gblBarcodeResult.gtin_out & gblBarcodeResult.batch_out);\r\n\r\n            If(\r\n                !IsBlank(existingInventory),\r\n                EditForm(InventoryForm_1),\r\n                NewForm(InventoryForm_1)\r\n            );\r\n            \r\n            SetFocus(QuantityInput_1)\r\n        )\r\n    );\r\n    \r\n    Set(gblIsProcessing, false);\r\n)\r\n"
                                    Placeholder: ="Click here and scan to begin adding/updating inventory"
                                    TriggerOutput: ='TextInputCanvas.TriggerOutput'.Delayed
                                    Value: =Parent.Default
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =BarcodeLabel_1.Y + BarcodeLabel_1.Height + 4
                              - Text1:
                                  Control: ModernText@1.0.0
                                  Properties:
                                    AutoHeight: =true
                                    Color: =RGBA(255, 0, 0, 1)
                                    Fill: =RGBA(255, 255, 255, 1)
                                    FontWeight: =FontWeight.Bold
                                    Height: =28
                                    Text: ="GTIN captured. Now scan the barcode with the Batch/Expiry information."
                                    Visible: =isWaitingForSecondScan
                                    Width: =Parent.Width-Self.X
                                    X: =24
                                    Y: =72
                        - QuantityCard_1:
                            Control: TypedDataCard@1.0.7
                            Variant: PcfCoreNumberEditCard
                            Properties:
                              BorderColor: =RGBA(243, 242, 241, 1)
                              DataField: ="cr31c_quantity"
                              Default: =ThisItem.Quantity
                              DisplayName: ="Quantity"
                              Height: =82
                              Required: =true
                              Update: =Value(QuantityInput_1.Text)
                              Width: =652
                              X: =1
                              Y: =0
                            Children:
                              - QuantityLabel_1:
                                  Control: FluentV8/Label@1.8.6
                                  MetadataKey: FieldName
                                  Properties:
                                    AutoHeight: =true
                                    FontSize: =9
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Tooltip: =Parent.DisplayName
                                    VerticalAlignment: =VerticalAlign.Bottom
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =10
                              - QuantityInput_1:
                                  Control: Classic/TextInput@2.3.2
                                  MetadataKey: FieldValue
                                  Properties:
                                    AccessibleLabel: =If(Parent.Required, Substitute("{0}. Required.", "{0}", Parent.DisplayName), Parent.DisplayName)
                                    BorderColor: =RGBA(243, 242, 241, 1)
                                    BorderThickness: =0
                                    Color: =RGBA(37, 36, 35, 1)
                                    Default: =If(!IsBlank(Parent.Default), Parent.Default, "1")
                                    DelayOutput: =true
                                    DisabledBorderColor: =RGBA(0, 0, 0, 0)
                                    DisabledColor: =RGBA(200, 198, 196, 1)
                                    DisabledFill: =RGBA(243, 242, 241, 1)
                                    DisplayMode: =Parent.DisplayMode
                                    Fill: =RGBA(255, 191, 0, 1)
                                    FocusedBorderColor: =RGBA(98, 100, 167, 1)
                                    FocusedBorderThickness: =2
                                    Font: =Font.'Segoe UI'
                                    Format: =TextFormat.Number
                                    Height: =32
                                    HintText: ="Indicate the quantity here"
                                    HoverBorderColor: =RGBA(243, 242, 241, 1)
                                    HoverColor: =RGBA(37, 36, 35, 1)
                                    HoverFill: =RGBA(243, 242, 241, 1)
                                    PaddingBottom: =4
                                    PaddingRight: =12
                                    PaddingTop: =0
                                    PressedBorderColor: =RGBA(98, 100, 167, 1)
                                    PressedColor: =RGBA(37, 36, 35, 1)
                                    PressedFill: =RGBA(243, 242, 241, 1)
                                    RadiusBottomLeft: =3
                                    RadiusBottomRight: =3
                                    RadiusTopLeft: =3
                                    RadiusTopRight: =3
                                    Size: =10.5
                                    Tooltip: =Parent.DisplayName
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =QuantityLabel_1.Y + QuantityLabel_1.Height + 4
                              - TextCanvas6:
                                  Control: Text@0.0.51
                                  Properties:
                                    Height: =26
                                    Text: |-
                                      ="Quantity Units: "&LookUp(GTIN_Lookups, ThisItem.ItemID = GTIN,'Unit Quantities')
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =171
                                    X: =239
                                    Y: =10
                        - ItemCodeCard_1:
                            Control: TypedDataCard@1.0.7
                            Variant: PcfCoreTextualEditCard
                            Properties:
                              BorderColor: =RGBA(243, 242, 241, 1)
                              DataField: ="cr31c_itemid"
                              Default: =ThisItem.ItemID
                              DisplayName: ="Item Code/GTIN"
                              MaxLength: =100
                              Required: =false
                              Update: =ItemCodeInput_1.Value
                              Width: =652
                              X: =0
                              Y: =1
                            Children:
                              - ItemCodeLabel_1:
                                  Control: FluentV8/Label@1.8.6
                                  MetadataKey: FieldName
                                  Properties:
                                    AutoHeight: =true
                                    FontSize: =9
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Tooltip: =Parent.DisplayName
                                    VerticalAlignment: =VerticalAlign.Bottom
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =10
                              - ItemCodeInput_1:
                                  Control: FluentV8/TextBox@1.7.2
                                  MetadataKey: FieldValue
                                  Properties:
                                    AccessibleLabel: =Parent.DisplayName
                                    DisplayMode: =Parent.DisplayMode
                                    Placeholder: ="This should auto-populate after you scan the barcode"
                                    Required: =Parent.Required
                                    Tooltip: =Parent.DisplayName
                                    Value: =gblBarcodeResult.gtin_out
                                    Width: =Parent.Width - 48
                                    X: =24
                                    Y: =ItemCodeLabel_1.Y + ItemCodeLabel_1.Height + 4
                        - ProductNameCard_1:
                            Control: TypedDataCard@1.0.7
                            Variant: PcfCoreTextualEditCard
                            Properties:
                              BorderColor: =RGBA(243, 242, 241, 1)
                              DataField: ="cr31c_name"
                              Default: =ThisItem.Name
                              DisplayName: ="Product Name"
                              MaxLength: =100
                              Required: =true
                              Update: =ProductNameInput_1.Value
                              Width: =652
                              X: =1
                              Y: =1
                            Children:
                              - ProductNameLabel_1:
                                  Control: FluentV8/Label@1.8.6
                                  MetadataKey: FieldName
                                  Properties:
                                    AutoHeight: =true
                                    FontSize: =9
                                    Height: =22
                                    Text: =Parent.DisplayName
                                    Tooltip: =Parent.DisplayName
                                    VerticalAlignment: =VerticalAlign.Bottom
                                    Width: =Parent.Width - 48
                                    X: =24
