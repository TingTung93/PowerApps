Screens:
  RapidScan:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
    Children:
      - ScreenContainer4:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer_2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  X: =40
                  Y: =40
                Children:
                  - HeaderTitle_2:
                      Control: Header@0.0.44
                      Properties:
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Title: ="Quick Pick - Inventory Management"
                        TitleFontSize: =12
            - MainContainer5:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - Container2:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: =RapidScanInput.Height
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                      Children:
                        - RapidScanInput:
                            Control: TextInput@0.0.54
                            Properties:
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnChange: |-
                                =// OnChange property of RapidScanInput

                                // --- 1. PREPARE & CLEAN BARCODE ---
                                // ... (your barcode cleaning logic remains the same) ...
                                ClearCollect(colTempBarcode, {Result: Self.Value});
                                ForAll(
                                    ["]d2", "]C1", Char(29), "]Q1"],
                                    Patch(colTempBarcode, First(colTempBarcode), {Result: Substitute(First(colTempBarcode).Result, Value, "")})
                                );
                                Set(varCleanedBarcode, Substitute(First(colTempBarcode).Result, " ", ""));

                                // --- 2. DECODE GS1 & GET PRODUCT INFO (with Error Handling) ---
                                Set(varBarcodeDetails, 'DecodeAlternate'.Run(Self.Value));

                                // *** MODIFICATION START: Use IfError to handle potential flow failures ***
                                Set(
                                    varSafeGTIN,
                                    IfError(varBarcodeDetails.gtin_out, "") // If gtin_out is an error, use ""
                                );
                                Set(
                                    varSafeBatch,
                                    IfError(varBarcodeDetails.batch_out, "") // If batch_out is an error, use ""
                                );
                                Set(
                                    varSafeExpiry,
                                    IfError(varBarcodeDetails.expiry_out, "") // If expiry_out is an error, use ""
                                );
                                // *** MODIFICATION END ***

                                // Check if the primary identifier was found. If not, stop and notify the user.
                                If(IsBlank(varSafeGTIN),
                                    Notify("Could not decode GTIN from barcode. Please check the barcode and try again.", NotificationType.Error);
                                    Reset(RapidScanInput);
                                    If(gblAppIsRunning, SetFocus(RapidScanInput));
                                    // Exit the rest of the OnChange logic
                                    ,

                                    // --- If GTIN was found, continue ---
                                    Set(varProductInfo, LookUp(GTIN_Lookups, GTIN = varSafeGTIN));

                                    Set(
                                        varParsedExpiryDate,
                                        If(
                                            !IsBlank(varSafeExpiry),
                                            Date(Value("20" & Left(varSafeExpiry, 2)), Value(Mid(varSafeExpiry, 3, 2)), Value(Right(varSafeExpiry, 2))),
                                            Blank() // If there's no expiry date, store a blank value
                                        )
                                    );

                                    Set(
                                        varExistingScan,
                                        LookUp(
                                            colScannedItems,
                                            ItemID = varSafeGTIN &&
                                            Batch = varSafeBatch &&
                                            Expiration = varParsedExpiryDate
                                        )
                                    );

                                    If(
                                        IsBlank(varExistingScan),
                                        Collect(
                                            colScannedItems,
                                            {
                                                CleanedBarcode: varCleanedBarcode,
                                                // Use the safe variables
                                                ItemID: varSafeGTIN,
                                                ProductName: IfError(varProductInfo.ItemName, "Unknown Product"), // Also protect the lookup
                                                Manufacturer: IfError(varProductInfo.ItemManufacturer, "Unknown Manufacturer"),
                                                Batch: varSafeBatch,
                                                Expiration: varParsedExpiryDate,
                                                Quantity: 1
                                            }
                                        ),
                                        Patch(
                                            colScannedItems,
                                            varExistingScan,
                                            {Quantity: varExistingScan.Quantity + 1}
                                        )
                                    );

                                    Reset(RapidScanInput);
                                    If(gblAppIsRunning, SetFocus(RapidScanInput));
                                );
                              Placeholder: ="Scan item barcode here..."
                  - Gallery4:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_pcfCore
                      Properties:
                        BorderColor: =RGBA(243, 242, 241, 1)
                        FocusedBorderColor: =RGBA(98, 100, 167, 1)
                        FocusedBorderThickness: =2
                        Items: =colScannedItems
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        TemplateSize: =52
                        WrapCount: =
                      Children:
                        - Rectangle2:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(53, 61, 63, 1)
                              BorderThickness: =1
                              DisabledFill: =RGBA(0,0,0,0)
                              Fill: =RGBA(0,0,0,0)
                              FocusedBorderColor: =RGBA(98, 100, 167, 1)
                              Height: =48
                              HoverFill: =RGBA(0,0,0,0)
                              OnSelect: =Select(Parent)
                              PressedFill: =RGBA(0,0,0,0)
                              TabIndex: =0
                              Width: =Parent.TemplateWidth
                        - NAME:
                            Control: FluentV8/Label@1.8.6
                            Properties:
                              FontWeight: =FontWeight.Semibold
                              Height: =24
                              OnSelect: =Select(Parent)
                              TabIndex: =-1
                              Text: =ThisItem.ProductName
                              VerticalAlignment: =VerticalAlign.Top
                              Width: =Parent.TemplateWidth - Self.X - 8
                              X: =12
                              Y: =((Parent.TemplateHeight - 36) / 2) - 4
                        - BATCH_EXP:
                            Control: FluentV8/Label@1.8.6
                            Properties:
                              FontSize: =9
                              FontWeight: =FontWeight.Normal
                              Height: =20
                              OnSelect: =Select(Parent)
                              TabIndex: =-1
                              Text: |-
                                ="Batch: " & ThisItem.Batch & " | Exp: " & Text(ThisItem.Expiration)
                              VerticalAlignment: =VerticalAlign.Top
                              Width: =173
                              X: =87
                              Y: =28
                        - QUANTITY:
                            Control: FluentV8/Label@1.8.6
                            Properties:
                              FontSize: =9
                              FontWeight: =FontWeight.Normal
                              Height: =20
                              OnSelect: =Select(Parent)
                              TabIndex: =-1
                              Text: |-
                                ="Qty: " & ThisItem.Quantity
                              VerticalAlignment: =VerticalAlign.Top
                              Width: =209
                              X: =NAME.X
                              Y: =28
            - FooterContainer1_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  PaddingBottom: =16
                  PaddingLeft: =16
                  PaddingRight: =16
                  PaddingTop: =16
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  X: =40
                  Y: =40
                Children:
                  - ClearSessionButton:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        OnSelect: |-
                          =// OnSelect property of ClearSessionButton
                          Clear(colScannedItems);
                          Notify("Current scanning session has been cleared.", NotificationType.Warning);
                          If(gblAppIsRunning, SetFocus(RapidScanInput));
                        Text: ="Clear Session"
                        Width: =150
                  - SubmitAllButton:
                      Control: Button@0.0.45
                      Properties:
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        OnSelect: "=Set(varIsSubmitting, true);\nNotify(\"Submitting inventory updates...\", NotificationType.Information);\n\n// Use 'As' operator for clear record scope\nForAll(\n    colScannedItems As ScannedItem, \n    \n    With(\n        {\n            // Use ScannedItem to reference the current record\n            existingInventoryItem: LookUp(Inventories, CleanedBarcode = ScannedItem.CleanedBarcode)\n        },\n        \n        If(\n            IsBlank(existingInventoryItem),\n            // CREATE NEW RECORD\n            Patch(\n                Inventories,\n                Defaults(Inventories),\n                {\n                    // Use ScannedItem. and wrap in IfError for safety\n                    CleanedBarcode: ScannedItem.CleanedBarcode,\n                    ItemID: ScannedItem.ItemID,\n                    Name: IfError(ScannedItem.ProductName, \"Unknown Product\"),\n                    Manufacturer_Lookup: IfError(ScannedItem.Manufacturer, \"Unknown Manufacturer\"),\n                    Batch: IfError(ScannedItem.Batch, \"\"), // Final safeguard\n                    Expiration: ScannedItem.Expiration,\n                    Quantity: ScannedItem.Quantity\n                }\n            ),\n            \n            // UPDATE EXISTING RECORD\n            Patch(\n                Inventories,\n                existingInventoryItem,\n                {\n                    Quantity: existingInventoryItem.Quantity + ScannedItem.Quantity\n                }\n            )\n        )\n    )\n);\n\n// --- CLEANUP AND NOTIFY ---\nClear(colScannedItems);\nSet(varIsSubmitting, false);\nNotify(\"Inventory successfully updated!\", NotificationType.Success);\nIf(gblAppIsRunning, SetFocus(RapidScanInput));"
                        Text: ="Submit All Scans"
                        Width: =150
