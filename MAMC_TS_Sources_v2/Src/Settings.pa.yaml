      Fill: =RGBA(240, 240, 240, 1)
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
      OnVisible: |-
        =UpdateContext({
            ctxAutoFocusEnabled: Coalesce(varAutoFocusEnabled, true),
            ctxSoundEnabled: Coalesce(varSoundEnabled, true),
            ctxAutoSubmitOnScan: Coalesce(varAutoSubmitOnScan, false),
            ctxDefaultQuantity: Coalesce(varDefaultQuantity, 1),
            ctxShowExpiredWarning: Coalesce(varShowExpiredWarning, true),
            ctxDaysBeforeExpiryWarning: Coalesce(varDaysBeforeExpiryWarning, 30)
        })
