                  - ExpiredItemsText:
                      Control: Text@0.0.51
                      Properties:
                        AutoHeight: =true
                        FontColor: =If(CountRows(Filter(Inventories, Expiration < Today())) > 0, RGBA(255, 0, 0, 1), RGBA(0, 0, 0, 1))
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =10
                        Text: |-
                          ="Expired items: " & CountRows(Filter(Inventories, Expiration < Today()))
                        Width: =Parent.Width/3
                  - ExpiringItemsText:
                      Control: Text@0.0.51
                      Properties:
                        AutoHeight: =true
                        FontColor: =If(CountRows(Filter(Inventories, And(Expiration >= Today(), Expiration <= DateAdd(Today(), varDaysBeforeExpiryWarning, TimeUnit.Days)))) > 0, RGBA(255, 165, 0, 1), RGBA(0, 0, 0, 1))
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        LayoutMinHeight: =10
                        Text: |-
                          ="Items expiring within " & varDaysBeforeExpiryWarning & " days: " & CountRows(Filter(Inventories, And(Expiration >= Today(), Expiration <= DateAdd(Today(), varDaysBeforeExpiryWarning, TimeUnit.Days))))
