                                          - ErrorMessage5_2:
                                              Control: Text@0.0.51
                                              MetadataKey: ErrorMessage
                                              Properties:
                                                Height: =30
                                                Text: =Parent.Error
                                                Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardValue4_2.Y + DataCardValue4_2.Height
                                          - StarVisible5_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldRequired
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Height: =30
                                                Text: ="*"
                                                Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =30
                                                Y: =DataCardKey5_2.Y
                                    - Expiration_DataCard2_2:
                                        Control: TypedDataCard@1.0.7
                                        Variant: DateTimeEdit
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          DataField: ="cr31c_expiration"
                                          Default: =ThisItem.Expiration
                                          DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Expiration)
                                          Required: =false
