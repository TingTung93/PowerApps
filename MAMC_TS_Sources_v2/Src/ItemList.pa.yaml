                                                X: =24
                                                Y: =10
                                          - DataCardValue1_2:
                                              Control: TextInput@0.0.54
                                              MetadataKey: FieldValue
                                              Properties:
                                                AccessibleLabel: =Parent.DisplayName
                                                DisplayMode: =Parent.DisplayMode
                                                Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                                                Required: =Parent.Required
                                                ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                Value: =Parent.Default
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardKey1_2.Y + DataCardKey1_2.Height + 4
                                          - ErrorMessage1_2:
                                              Control: Text@0.0.51
                                              MetadataKey: ErrorMessage
                                              Properties:
                                                Height: =30
                                                Text: =Parent.Error
                                                Visible: =And(!IsBlank(Parent.Error), Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardValue1_2.Y + DataCardValue1_2.Height
                                          - StarVisible1_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldRequired
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Height: =30
                                                Text: ="*"
                                                Visible: =And(Parent.Required, Parent.DisplayMode=DisplayMode.Edit)
                                                Width: =30
                                                Y: =DataCardKey1_2.Y
                                    - Barcode_DataCard1_2:
                                        Control: TypedDataCard@1.0.7
                                        Variant: TextualEdit
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          DataField: ="cr31c_barcode"
                                          Default: =ThisItem.Barcode
                                          DisplayName: =DataSourceInfo([@Inventories],DataSourceInfo.DisplayName,Barcode)
                                          MaxLength: =DataSourceInfo([@Inventories], DataSourceInfo.MaxLength, Barcode)
                                          Required: =false
                                          Update: =BarcodeScanner1_2.Value
                                          Width: =459
                                          X: =1
                                          Y: =0
                                        Children:
                                          - DataCardKey2_2:
                                              Control: Text@0.0.51
                                              MetadataKey: FieldName
                                              Properties:
                                                Height: =22
                                                Text: =Parent.DisplayName
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width - 48
                                                Wrap: =false
                                                X: =24
                                                Y: =10
                                          - BarcodeScanner1_2:
                                              Control: TextInput@0.0.54
                                              MetadataKey: FieldValue
                                              Properties:
                                                AccessibleLabel: =Parent.DisplayName
                                                DisplayMode: =Parent.DisplayMode
                                                Mode: ="'TextInputCanvas.Mode'.TextInputModeSingleLine"
                                                OnChange: |-
                                                  =If(
                                                                          Len(BarcodeScanner1_2.Value) >= 17,
                                                                          Set(varBarcodeData,
                                                                              With(
                                                                                  {
                                                                                      BC: BarcodeScanner1_2.Value,
                                                                                      IsValid: And(StartsWith(BarcodeScanner1_2.Value, "01"), Len(BarcodeScanner1_2.Value) >= 17)
                                                                                  },
                                                                                  If(IsValid,
                                                                                      {
                                                                                          ItemID: Mid(BC, 3, 14),
                                                                                          Expiration: If(
                                                                                              And(Len(BC) >= 25, Mid(BC, 17, 2) = "17"),
                                                                                              Mid(BC, 19, 6),
                                                                                              ""
                                                                                          ),
                                                                                          Batch: If(
                                                                                              And(Len(BC) >= 27, Mid(BC, 25, 2) = "10"),
                                                                                              // Extract batch until we hit "91" or end of string
                                                                                              With(
                                                                                                  {
                                                                                                      BatchStart: 27,
                                                                                                      AI91Position: If(
                                                                                                          Find("91", BC, 27) > 0,
                                                                                                          Find("91", BC, 27),
                                                                                                          Len(BC) + 1
                                                                                                      )
                                                                                                  },
                                                                                                  Mid(BC, BatchStart, AI91Position - BatchStart)
                                                                                              ),
                                                                                              ""
                                                                                          ),
                                                                                          InternalInfo: If(
                                                                                              Find("91", BC) > 0,
                                                                                              Mid(BC, Find("91", BC) + 2, Len(BC) - Find("91", BC) - 1),
                                                                                              ""
                                                                                          ),
                                                                                          ExpirationFormatted: If(
                                                                                              And(Len(BC) >= 25, Mid(BC, 17, 2) = "17"),
                                                                                              Date(
                                                                                                  2000 + Value(Mid(BC, 19, 2)),
                                                                                                  Value(Mid(BC, 21, 2)),
                                                                                                  Value(Mid(BC, 23, 2))
                                                                                              ),
                                                                                              Blank()
                                                                                          ),
                                                                                          IsValidBarcode: true
                                                                                      },
                                                                                      {
                                                                                          ItemID: "",
                                                                                          Expiration: "",
                                                                                          Batch: "",
                                                                                          InternalInfo: "",
                                                                                          ExpirationFormatted: Blank(),
                                                                                          IsValidBarcode: false
                                                                                      }
                                                                                  )
                                                                              )
                                                                          );
                                                                          If(
                                                                              !varBarcodeData.IsValidBarcode,
                                                                              Notify("Invalid barcode format. Expected GS1 format starting with '01'", NotificationType.Warning)
                                                                          )
                                                                      )
                                                Required: =Parent.Required
                                                ValidationState: =If(IsBlank(Parent.Error), "None", "Error")
                                                Value: =Parent.Default
                                                Width: =Parent.Width - 48
                                                X: =24
                                                Y: =DataCardKey2_2.Y + DataCardKey2_2.Height + 4
                                          - ErrorMessage2_2:
