                                          MaxLength: =DataSourceInfo([@Inventories], DataSourceInfo.MaxLength, Name)
                                          Required: =false
                                          Update: =DataCardValue1_2.Value
                                          Width: =459
                                          X: =0
                                          Y: =0
                                        Children:
                                          - DataCardKey1_2:
