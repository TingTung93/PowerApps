                                    - ArchiveExpiredButton_1:
                                        Control: Button@0.0.45
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          OnSelect: |-
                                            =ForAll(
                                                Filter(Inventories, Expiration < Today()),
                                                Patch(
                                                    Expireds,
                                                    Defaults(Expireds),
                                                    {
                                                        Name: Name,
                                                        Lot: batch,
                                                        expiration: Expiration,
                                                        quantity: Quantity,
                                                        manufacturer: Manufacturer_Lookup,
                                                        GTIN: ItemID,
                                                        archived_date: Today(),
                                                        Archived_reason: "Expired"
                                                    }
                                                )
                                            );
                                            RemoveIf(Inventories, Expiration < Today());

                                            Notify("Expired items archived successfully", NotificationType.Success)
                                          Text: ="Archive Expired Items"
                                          VerticalAlign: =
                                          Width: =150
                        - MainContainer1_4:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =16
                              LayoutMaxHeight: =
