                        Transition: =Transition.Pop
                        Width: =Parent.Width/2
                      Children:
                        - Rectangle4:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: |-
                                =Switch(
                                    true,
                                    ThisItem.Expiration < Today(),
                                    RGBA(220, 38, 38, 1),     // Red border for expired
                                    ThisItem.Expiration <= DateAdd(Today(), 7),
                                    RGBA(234, 88, 12, 1),     // Orange border for expiring soon
                                    ThisItem.Expiration <= DateAdd(Today(), 30),
                                    RGBA(251, 191, 36, 1),    // Yellow border for caution
                                    RGBA(34, 197, 94, 1)      // Green border for good
                                )
                              BorderThickness: =5
                              DisabledFill: =RGBA(0,0,0,0)
                              Fill: |-
                                =Switch(
                                    true,
                                    ThisItem.Expiration < Today(),
                                    RGBA(220, 38, 38, 0.15),  // Light red for expired
                                    ThisItem.Expiration <= DateAdd(Today(), 7),
                                    RGBA(234, 88, 12, 0.15),  // Light orange for expiring within 7 days
                                    ThisItem.Expiration <= DateAdd(Today(), 30),
                                    RGBA(251, 191, 36, 0.15), // Light yellow for expiring within 30 days
                                    RGBA(34, 197, 94, 0.15)   // Light green for good
                                )
                              FocusedBorderColor: =RGBA(98, 100, 167, 1)
                              Height: =Parent.TemplateHeight
                              HoverFill: =RGBA(98, 100, 167, 0.1)
                              OnSelect: =Select(Parent)
                              PressedFill: =RGBA(98, 100, 167, 0.2)
                              TabIndex: =0
                              Width: =Parent.TemplateWidth
                        - HtmlCard:
                            Control: HtmlViewer@1.0.6
                            Properties:
                              HtmlText: |-
                                ="<div style='padding: 12px; font-family: Segoe UI, sans-serif; line-height: 1.5; color: #111827; height: 100%; box-sizing: border-box; overflow: hidden;'>
                                    <div style='display: flex; justify-content: space-between; align-items: flex-start;'>
                                        <div style='font-weight: 600; font-size: 16px; margin-bottom: 4px;'>" & ThisItem.Name & "</div>
                                        <div style='font-size: 13px; font-weight: bold; color: " & If(ThisItem.Expiration < Today(), "#DC2626", If(ThisItem.Expiration <= DateAdd(Today(), 7), "#C2410C", "#374151")) & ";'>" & 
                                            If(ThisItem.Expiration < Today(), "EXPIRED", If(ThisItem.Expiration <= DateAdd(Today(), 30), DateDiff(Today(), ThisItem.Expiration) & "d", "")) & "
                                        </div>
                                    </div>
                                    <div style='font-size: 12px; margin-bottom: 8px; color: " & If(ThisItem.Expiration < Today(), "#DC2626", If(ThisItem.Expiration <= DateAdd(Today(), 7), "#C2410C", "#6B7280")) & ";'>
                                        Expires: " & Text(DateValue(ThisItem.Expiration, "en"), "mm/dd/yyyy") & "
                                    </div>
                                    <div style='font-size: 12px; color: #6B7280;'>
                                        Batch: " & ThisItem.Batch & If(!IsBlank(ThisItem.Quantity), " • Qty: " & ThisItem.Quantity & " " & LookUp(GTIN_Lookups, ThisItem.ItemID = GTIN, 'Unit Quantities'), "") & "
                                    </div>
                                </div>"
                              Height: =Parent.TemplateHeight
                              Width: =Parent.TemplateWidth
                              OnSelect: =Select(Parent)
                              PaddingBottom: =0
                              PaddingLeft: =0
                              PaddingRight: =0
                              PaddingTop: =0
