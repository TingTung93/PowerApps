                                    - DataCard1_1:
                                        Control: TypedDataCard@1.0.7
                                        Variant: BlankCard
                                        Properties:
                                          BorderColor: =RGBA(243, 242, 241, 1)
                                          Height: =77
                                          Width: =459
                                          X: =0
                                          Y: =0
                                        Children:
                                          - BarcodeScannerRegistration_1:
                                              Control: TextInput@0.0.54
                                              Properties:
                                                BorderColor: =RGBA(0, 0, 0, 1)
                                                BorderStyle: =BorderStyle.Solid
                                                BorderThickness: =1
                                                Fill: =RGBA(152, 208, 70, 0.54)
                                                OnChange: |
                                                  =// --- Enhanced OnChange Logic with Duplicate Check and Parentheses Handling ---

                                                  // 1. Clean and Parse the scanned barcode data
                                                  With(
                                                      {
                                                          // Clean the barcode first by removing parentheses
                                                          cleanedBarcode: Substitute(Substitute(Self.Value, "(", ""), ")", "")
                                                      },
                                                      With(
                                                          {
                                                              localBarcodeData: {
                                                                  ItemID: Mid(cleanedBarcode, 3, 14),
                                                                  Expiration: Mid(cleanedBarcode, 19, 6),
                                                                  Batch: Mid(cleanedBarcode, 27, Len(cleanedBarcode) - 26),
                                                                  ExpirationFormatted: Date(
                                                                      2000 + Value(Mid(cleanedBarcode, 19, 2)),
                                                                      Value(Mid(cleanedBarcode, 21, 2)),
                                                                      Value(Mid(cleanedBarcode, 23, 2))
                                                                  )
                                                              }
                                                          },

                                                          // 2. Look up the parsed GTIN in the data source
                                                          With(
                                                              {
                                                                  existingRecord: LookUp(GTIN_Lookups, GTIN = localBarcodeData.ItemID)
                                                              },

                                                              // 3. Decide whether to show the existing record or start a new one
                                                              If(
                                                                  !IsBlank(existingRecord),

                                                                  // --- RECORD FOUND ---
                                                                  // Set form to View mode and load the found data
                                                                  UpdateContext({
                                                                      CurrentItem: existingRecord,
                                                                      newMode: false,
                                                                      editMode: false,
                                                                      isItemSelected: true
                                                                  });
                                                                  ViewForm(Form1_3);
                                                                  Notify("Existing item found. Details have been loaded.", NotificationType.Information, 3000),

                                                                  // --- RECORD NOT FOUND ---
                                                                  // Set form to New mode to register a new item
                                                                  UpdateContext({
                                                                      newMode: true,
                                                                      editMode: false,
                                                                      isItemSelected: false
                                                                  });
                                                                  NewForm(Form1_3);
                                                                  // Set the global variable that the GTIN field uses to populate itself
                                                                  Set(varBarcodeData, localBarcodeData);
                                                                  Notify("New item. Please complete the registration details.", NotificationType.Information, 3000)
                                                              )
                                                          )
                                                      )
                                                  );

                                                  // 4. Reset the scanner input field after processing
                                                  Reset(Self)
                                                TriggerOutput: ='TextInputCanvas.TriggerOutput'.Delayed
                                                Value: =BarcodeInput_1.Value
                                                X: =28
                                                Y: =32
