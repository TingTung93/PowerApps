                                    OnSuccess: "=// Actions to perform after a successful form submission\n\n// Reset the form and update screen context\nUpdateContext({\n    GallerySelected: Self.LastSubmit,\n    isItemSelected: false,\n    newMode: false,\n    editMode: false\n});\nResetForm(Form1_3);\n\n// Check if we came from the QuickPick screen to provide tailored user feedback\nIf(\n    !IsBlank(ctxRegBarcode),\n    \n    // If so, set the flag, navigate back, and show a specific message\n    Set(varReturnToQuickPick, true);\n    Navigate(QuickPick, ScreenTransition.None);\n    Notify(\"Product registered! You can now add it to your inventory.\", NotificationType.Success, 4000),\n    \n    // Otherwise, just show a standard success message for a regular save\n    Notify(\"✓ Item saved successfully\", NotificationType.Success, 3000)\n);\n"
                                    Width: =Parent.Width
