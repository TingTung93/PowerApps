Screens:
  Archive:
    Properties:
      Fill: =gblTheme.Background
      LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
    Children:
      - ScreenContainer3:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =gblTheme.Background
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer4:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =gblTheme.Radius
                  RadiusBottomRight: =gblTheme.Radius
                  RadiusTopLeft: =gblTheme.Radius
                  RadiusTopRight: =gblTheme.Radius
                Children:
                  - Header3:
                      Control: Header@0.0.44
                      Properties:
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Title: ="Header"
            - MainContainer4:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  LayoutWrap: =true
                  RadiusBottomLeft: =gblTheme.Radius
                  RadiusBottomRight: =gblTheme.Radius
                  RadiusTopLeft: =gblTheme.Radius
                  RadiusTopRight: =gblTheme.Radius
