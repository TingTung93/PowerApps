                        - CancelButton_1:
                            Control: Button@0.0.45
                            Properties:
                              AccessibleLabel: ="Cancel form button"
                              Appearance: ='ButtonCanvas.Appearance'.Secondary
                              LayoutMaxHeight: =
                              LayoutMaxWidth: =
                              OnSelect: |-
                                =// Suppress OnChange during cleanup
                                Set(varSuppressOnChange, true);

                                ResetForm(InventoryForm_1);
                                NewForm(InventoryForm_1);
                                Notify("Changes discarded", NotificationType.Warning);

                                // Clear variables
                                Set(cleanedBarcode, "");
                                Set(gtin, "");
                                Set(batch, "");
                                Set(expiry, "");
                                Set(expiryFormatted, "");
                                Set(existingInventory, Blank());
                                Set(varRawBarcode, "");
                                Set(isAwaitingSecondScan, false);

                                // Reset the barcode input
                                Set(varResetBarcode, true);

                                // Re-enable OnChange, then release reset
                                Set(varSuppressOnChange, false);
                                Set(varResetBarcode, false);

                                // Clear barcode result last
                                Set(gblBarcodeResult, Blank());
                              Text: ="Cancel"
                              Width: =120
