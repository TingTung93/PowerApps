                            Set(varIsItemSelected, true);
                            Set(varNewMode, false);
                            Set(varEditMode, true);
                            Set(varCurrentItem, Gallery2.Selected); // Set the selected item to varCurrentItem
                            Navigate(Inventory, ScreenTransition.None), // Force a full screen refresh by navigating to itself
                            Notify("Please select an item to view/edit.", NotificationType.Warning, 3000) // User feedback if no item is selected
                        )
