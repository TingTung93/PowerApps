                Gallery2 As gallery.BrowseLayout_Vertical_ThreeTextVariant_pcfCore:
                    BorderColor: =RGBA(243, 242, 241, 1)
                    DelayItemLoading: =true
                    FocusedBorderColor: =RGBA(98, 100, 167, 1)
                    FocusedBorderThickness: =2
                    Items: |-
                        =With(
                            {
                                // Input values from controls
                                wSearchText: Trim(SearchInput1_2.Value),
                                wSelectedManufacturers: ManufacturerDropdown.SelectedItems,
                                wShowExpired: varShowExpired
                            },
                            With(
                                {
                                    // Step 1: Start with the base data and apply the Search function.
                                    // NOTE: The Search() function requires column names to be text strings in quotes.
                                    FilteredData: If(
                                        IsBlank(wSearchText),
                                        Inventories,
                                        Search(
                                            Inventories,
                                            wSearchText,
                                            Name, 
                                            Barcode, 
                                            Batch, 
                                            ItemID, 
                                            'Item Category'
                                        )
                                    )
                                },
                                
                                // Step 2: Apply conditional filters on top of the searched data.
                                // NOTE: The Filter() function uses direct column references WITHOUT quotes.
                                SortByColumns(
                                    Filter(
                                        FilteredData,
                                        
                                        // Manufacturer Filter: This logic correctly handles a multi-select ComboBox.
                                        (IsEmpty(wSelectedManufacturers) || Manufacturer_Lookup in wSelectedManufacturers.Value),
                                        
                                        // Expired Filter: Applies only if the toggle is on.
                                        (Not(wShowExpired) || Expiration < Today())
                                    ),
                                    
                                    // Step 3: Sort the final results.
                                    // NOTE: The SortByColumns() function also requires column names in quotes.
                                    "cr31c_name", SortOrder.Ascending,
                                    "cr31c_expiration", SortOrder.Ascending
                                )
                            )
                        )
                    Layout: =Layout.Vertical
                    LayoutMaxHeight: =
                    LayoutMaxWidth: =
                    LayoutMinHeight: =287
                    LayoutMinWidth: =320
                    LoadingSpinner: =LoadingSpinner.Data
