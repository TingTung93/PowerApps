App As appinfo:
    BackEnabled: =true
    OnStart: |
        =Set(varShowExpired, false);
        Set(varIsItemSelected, false);
        Set(varNewMode, false);
        Set(varEditMode, false);
        Set(varDeleteMode, false);
        Set(varCurrentItem, Blank());
        Set(varSelectedRecord, Blank());
        Set(varDefaultMan, Table());
        Set(gblAppIsRunning, true);
        ClearCollect(
            colStringsToRemove,
            {Value: "]d2"},      // GS1-128 AIM Code
            {Value: "]C1"},      // Code 128 AIM Code
            {Value: Char(29)},
            {Value: "]Q1"}
               // The true FNC1 / Group Separator character
            // -> To add another, just add a new line like: {Value: "]A0"}
        );
    StartScreen: =
    Theme: =PowerAppsTheme

    Host As hostControl.DefaultHostControlVariant:
        OnCancel: =false
        OnEdit: =false
        OnNew: =false
        OnSave: =false
        OnView: =false

    Teams As hostControl.TeamsHostControlVariant:
        OnCancel: =false
        OnEdit: =false
        OnNew: =false
        OnSave: =false
        OnView: =false

