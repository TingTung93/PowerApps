            =With({
                              FilteredCount: CountRows(If(IsEmpty(CATEGORY.SelectedItems), Inventories, Filter(Inventories, 'Item Category' in CATEGORY.SelectedItems.Value)))
                          }, If(FilteredCount <= 30, 140, FilteredCount <= 60, 72, 70))
        Width: =767
        WrapCount: |-
            =With(
                {
                    FilteredCount: CountRows(
                        If(
                            IsEmpty(CATEGORY.SelectedItems),
                            Inventories,
                            Filter(
                                Inventories,
                                'Item Category' in CATEGORY.SelectedItems.Value
                            )
                        )
                    )
                },
                If(
                    FilteredCount <= 45,
                    3,
                    FilteredCount <= 75,
                    4,
                    6
                )
            )
