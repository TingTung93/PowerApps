    ContentLanguage: =""
    LoadingSpinnerColor: =RGBA(98, 100, 167, 1)
    OnVisible: |-
        =// Check if coming from QuickPick with registration data
        If(!IsBlank(varRegistrationGTIN),
           // Pre-populate the registration form with data from QuickPick
           UpdateContext({
               ctxRegGTIN: varRegistrationGTIN,
               ctxRegBatch: varRegistrationBatch,
               ctxRegExpiry: varRegistrationExpiry,
               ctxRegBarcode: varRegistrationBarcode
           });
           
           // Clear the registration variables after use
           Set(varRegistrationGTIN, Blank());
           Set(varRegistrationBatch, Blank());
           Set(varRegistrationExpiry, Blank());
           Set(varRegistrationBarcode, Blank());
           
           // Show notification
           Notify("Please register this product before adding to inventory", NotificationType.Information, 3000)
        )

