                "RapidScanInput As 'Text input'":
                    BasePaletteColor: =
                    BorderColor: =
                    DisplayMode: =DisplayMode.Edit
                    Fill: =
                    FontColor: =
                    Height: =32
                    LayoutMaxHeight: =
                    LayoutMaxWidth: =
                    LayoutMinHeight: =32
                    LayoutMinWidth: =320
                    OnChange: |-
                        =// OnChange property of RapidScanInput
                        
                        // --- 1. PREPARE & CLEAN BARCODE ---
                        // ... (your barcode cleaning logic remains the same) ...
                        ClearCollect(colTempBarcode, {Result: Self.Value});
                        ForAll(
                            ["]d2", "]C1", Char(29), "]Q1"],
                            Patch(colTempBarcode, First(colTempBarcode), {Result: Substitute(First(colTempBarcode).Result, Value, "")})
                        );
                        Set(varCleanedBarcode, Substitute(First(colTempBarcode).Result, " ", ""));
                        
                        // --- 2. DECODE GS1 & GET PRODUCT INFO (with Error Handling) ---
                        Set(varBarcodeDetails, 'DecodeAlternate'.Run(Self.Value));
                        
                        // *** MODIFICATION START: Use IfError to handle potential flow failures ***
                        Set(
                            varSafeGTIN,
                            IfError(varBarcodeDetails.gtin_out, "") // If gtin_out is an error, use ""
                        );
                        Set(
                            varSafeBatch,
                            IfError(varBarcodeDetails.batch_out, "") // If batch_out is an error, use ""
                        );
                        Set(
                            varSafeExpiry,
                            IfError(varBarcodeDetails.expiry_out, "") // If expiry_out is an error, use ""
                        );
                        // *** MODIFICATION END ***
                        
                        // Check if the primary identifier was found. If not, stop and notify the user.
                        If(IsBlank(varSafeGTIN),
                            Notify("Could not decode GTIN from barcode. Please check the barcode and try again.", NotificationType.Error);
                            Reset(RapidScanInput);
                            If(gblAppIsRunning, SetFocus(RapidScanInput));
                            // Exit the rest of the OnChange logic
                            ,
                        
                            // --- If GTIN was found, continue ---
                            Set(varProductInfo, LookUp(GTIN_Lookups, GTIN = varSafeGTIN));
                        
                            Set(
                                varParsedExpiryDate,
                                If(
                                    !IsBlank(varSafeExpiry),
                                    Date(Value("20" & Left(varSafeExpiry, 2)), Value(Mid(varSafeExpiry, 3, 2)), Value(Right(varSafeExpiry, 2))),
                                    Blank() // If there's no expiry date, store a blank value
                                )
                            );
                        
                            Set(
                                varExistingScan,
                                LookUp(
                                    colScannedItems,
                                    ItemID = varSafeGTIN &&
                                    Batch = varSafeBatch &&
                                    Expiration = varParsedExpiryDate
                                )
                            );
                        
                            If(
                                IsBlank(varExistingScan),
                                Collect(
                                    colScannedItems,
                                    {
                                        CleanedBarcode: varCleanedBarcode,
                                        // Use the safe variables
                                        ItemID: varSafeGTIN,
                                        ProductName: IfError(varProductInfo.ItemName, "Unknown Product"), // Also protect the lookup
                                        Manufacturer: IfError(varProductInfo.ItemManufacturer, "Unknown Manufacturer"),
                                        Batch: varSafeBatch,
                                        Expiration: varParsedExpiryDate,
                                        Quantity: 1
                                    }
                                ),
                                Patch(
                                    colScannedItems,
                                    varExistingScan,
                                    {Quantity: varExistingScan.Quantity + 1}
                                )
                            );
                        
                            Reset(RapidScanInput);
                            If(gblAppIsRunning, SetFocus(RapidScanInput));
                        );
                    Placeholder: ="Scan item barcode here..."
                    Width: =320
                    X: =0
                    Y: =0
                    ZIndex: =1

