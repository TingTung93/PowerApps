                OnSelect: |-
                    =Set(varIsSubmitting, true);
                    Notify("Submitting inventory updates...", NotificationType.Information);
                    
                    // Use 'As' operator for clear record scope
                    ForAll(
                        colScannedItems As ScannedItem, 
                        
                        With(
                            {
                                // Use ScannedItem to reference the current record
                                existingInventoryItem: LookUp(Inventories, CleanedBarcode = ScannedItem.CleanedBarcode)
                            },
                            
                            If(
                                IsBlank(existingInventoryItem),
                                // CREATE NEW RECORD
                                Patch(
                                    Inventories,
                                    Defaults(Inventories),
                                    {
                                        // Use ScannedItem. and wrap in IfError for safety
                                        CleanedBarcode: ScannedItem.CleanedBarcode,
                                        ItemID: ScannedItem.ItemID,
                                        Name: IfError(ScannedItem.ProductName, "Unknown Product"),
                                        Manufacturer_Lookup: IfError(ScannedItem.Manufacturer, "Unknown Manufacturer"),
                                        Batch: IfError(ScannedItem.Batch, ""), // Final safeguard
                                        Expiration: ScannedItem.Expiration,
                                        Quantity: ScannedItem.Quantity
                                    }
                                ),
                                
                                // UPDATE EXISTING RECORD
                                Patch(
                                    Inventories,
                                    existingInventoryItem,
                                    {
                                        Quantity: existingInventoryItem.Quantity + ScannedItem.Quantity
                                    }
                                )
                            )
                        )
                    );
                    
                    // --- CLEANUP AND NOTIFY ---
                    Clear(colScannedItems);
                    Set(varIsSubmitting, false);
                    Notify("Inventory successfully updated!", NotificationType.Success);
                    If(gblAppIsRunning, SetFocus(RapidScanInput));
                TabIndex: =0
                Text: ="Submit All Scans"
