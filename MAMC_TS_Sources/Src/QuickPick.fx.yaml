                    "BarcodeInput_1 As 'Text input'":
                        BasePaletteColor: =
                        BorderColor: =
                        DisplayMode: =Parent.DisplayMode
                        Fill: =RGBA(152, 208, 70, 1)
                        FontColor: =
                        Height: =32
                        OnChange: |
                            =// --- Enhanced Barcode Logic for Stacked Barcodes (v3) ---
                            
                            // This variable will hold the complete barcode string, whether from one scan or two.
                            UpdateContext({localCompleteBarcode: ""});
                            
                            // If we are waiting for the second part of a stacked barcode...
                            If(
                                isWaitingForSecondScan,
                                
                                // --- THIS IS THE SECOND SCAN ---
                                
                                // 1. Reconstruct the full barcode string.
                                UpdateContext({localCompleteBarcode: ctxFirstScanValue & Self.Value});
                                
                                // 2. Parse the COMBINED barcode string.
                                Set(
                                    gblBarcodeResult,
                                    'DecodeAlternate'.Run(Substitute(Substitute(localCompleteBarcode, "(", ""), ")", ""))
                                );
                                
                                // 3. Reset the state flag.
                                UpdateContext({isWaitingForSecondScan: false});
                                
                            ,
                                // --- THIS IS THE FIRST (or a complete) SCAN ---
                                
                                // 1. Start processing and parse the initial scan.
                                Set(gblIsProcessing, true);
                                UpdateContext({localCompleteBarcode: Self.Value});
                                Set(
                                    gblBarcodeResult,
                                    'DecodeAlternate'.Run(Substitute(Substitute(localCompleteBarcode, "(", ""), ")", ""))
                                );
                                
                                // 2. Check if the scan was partial (only GTIN was found).
                                If(
                                    !IsBlank(gblBarcodeResult.gtin_out) && IsBlank(gblBarcodeResult.batch_out) && IsBlank(gblBarcodeResult.expiry_out),
                                    
                                    // --- PARTIAL SCAN DETECTED ---
                                    
                                    // a. Store the value of the first scan.
                                    Set(ctxFirstScanValue, Self.Value);
                                    
                                    // b. Set the app to a "waiting" state.
                                    UpdateContext({isWaitingForSecondScan: true});
                                    
                                    // c. Set focus back to the input for the second scan.
                                    SetFocus(BarcodeInput_1);
                                    
                                    ,
                                    
                                    // --- COMPLETE SCAN DETECTED ---
                                    UpdateContext({isWaitingForSecondScan: false})
                                )
                            );
                            
                            
                            // =====[ SHARED LOGIC - RUNS AFTER A COMPLETE SCAN IS ASSEMBLED ]=====
                            
                            If(
                                !isWaitingForSecondScan,
                                
                                // Use the parsed GTIN to check if the product is registered.
                                With(
                                    {
                                        registeredItem: LookUp(GTIN_Lookups, GTIN = gblBarcodeResult.gtin_out)
                                    },
                                    If(
                                        IsBlank(registeredItem) && !IsBlank(gblBarcodeResult.gtin_out),
                                        
                                        // --- ITEM NOT REGISTERED ---
                                        Notify("This item is not registered. Please register it now.", NotificationType.Warning);
                                        Navigate(
                                            Registration,
                                            ScreenTransition.None,
                                            {
                                                varRegistrationBarcode: localCompleteBarcode,
                                                varRegistrationGTIN: gblBarcodeResult.gtin_out,
                                                varRegistrationBatch: gblBarcodeResult.batch_out,
                                                varRegistrationExpiry: gblBarcodeResult.expiry_out
                                            }
                                        ),
                                        
                                        // --- ITEM IS ALREADY REGISTERED ---
                            
                                        // **KEY FIX:** Use the original, complete barcode string for the inventory lookup.
                                        Set(
                                            existingInventory,
                                            LookUp(Inventories, Barcode = localCompleteBarcode)
                                        );
                                        
                                        // Set the gblCleanedBarcode for saving later, if needed.
                                        Set(gblCleanedBarcode, gblBarcodeResult.gtin_out & gblBarcodeResult.batch_out);
                            
                                        If(
                                            !IsBlank(existingInventory),
                                            EditForm(InventoryForm_1),
                                            NewForm(InventoryForm_1)
                                        );
                                        
                                        SetFocus(QuantityInput_1)
                                    )
                                );
                                
                                Set(gblIsProcessing, false);
                            )
                        PCFTeamsTheme: ="default"
